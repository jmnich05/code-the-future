<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Code the Future — Module 1 · What Is AI?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;600&family=JetBrains+Mono:wght@500&display=swap');
  body{ margin:0; min-height:100dvh; display:flex; align-items:center; justify-content:center; font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    color:#fff; background:radial-gradient(130% 150% at 80% -10%, rgba(38,199,209,.28), transparent 55%), linear-gradient(160deg,#0F1B3A,#070C1A); }
  .wrap{ max-width:680px; padding:32px; text-align:center; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#26C7D1; }
  h1{ font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:-.03em; font-size:3rem; margin:.2em 0; }
  h1 .accent{ background:linear-gradient(120deg,#3D74FF,#26C7D1); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  p.sub{ opacity:.85; font-size:1.15rem; margin:0 0 32px; }
  .cards{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:560px){ .cards{ grid-template-columns:1fr; } h1{ font-size:2.2rem; } }
  a.card{ display:block; text-decoration:none; color:#fff; padding:30px 24px; border-radius:22px; border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.05); transition:transform .15s, background .15s, border-color .15s; }
  a.card:hover{ transform:translateY(-4px); background:rgba(255,255,255,.10); border-color:rgba(38,199,209,.5); }
  a.card .ic{ font-size:2.4rem; }
  a.card h2{ font-family:'Space Grotesk',sans-serif; margin:.3em 0 .15em; font-size:1.5rem; }
  a.card span{ opacity:.7; font-size:.95rem; }
  .foot{ margin-top:28px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; opacity:.5; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">◆ Code the Future · Module 1</p>
    <h1>What Is <span class="accent">AI</span>?</h1>
    <p class="sub">Pick your path. Each one is a guided, full-screen lesson — one idea at a time.</p>
    <div class="cards">
      <a class="card" href="player.html?track=kids"><div class="ic">🚀</div><h2>Kids</h2><span>Ages 8–11 · 12 Missions</span></a>
      <span class="card" style="opacity:.45;cursor:default"><div class="ic">◆</div><h2>Adults</h2><span>Coming soon</span></span>
    </div>
    <p class="foot"><a href="../../../platform/index.html" style="color:#26C7D1;text-decoration:none">← HOME</a> · CODE THE FUTURE · LOUISVILLE · 2026</p>
  </div>
</body>
</html>
