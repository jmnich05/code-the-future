<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Code the Future — Module 1 · Capstone (Adults)</title>
<link rel="stylesheet" href="ctf-ai.css">
<style>
  body{ margin:0; background:#F6F8FC; font-family:'Plus Jakarta Sans',system-ui,sans-serif; color:#2A3349; }
  .wrap{ max-width:760px; margin:0 auto; padding:0 16px 80px; }
  .hero{ position:relative; overflow:hidden; border-radius:0 0 32px 32px; padding:54px 32px 88px; color:#fff;
    background:radial-gradient(130% 150% at 82% -15%, rgba(38,199,209,.30), transparent 55%), linear-gradient(160deg,#0F1B3A 0%,#070C1A 100%); }
  .hero .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#26C7D1; margin:0 0 14px; }
  .hero h1{ font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:-.03em; font-size:2.9rem; line-height:1.04; margin:0 0 12px; }
  .hero h1 .accent{ background:linear-gradient(120deg,#3D74FF,#26C7D1); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .hero p{ margin:0; opacity:.9; font-size:1.18rem; max-width:54ch; }
  @media (max-width:520px){ .hero h1{ font-size:2.2rem; } .hero{ padding:40px 22px 72px; } }
</style>
</head>
<body>
  <div class="hero">
    <p class="eyebrow">◆ Module 1 · What Is AI? · Type B (Adults)</p>
    <h1>Capstone — <span class="accent">create &amp; use AI</span></h1>
    <p>You understand what AI is. Now operate one: write a prompt, turn the temperature dial from Section 8, and watch next-token prediction happen.</p>
  </div>
  <div class="wrap">
    <div class="ctf"><div data-ctf-ai="adults" data-endpoint="/api/ai"></div></div>
  </div>
  <script src="ctf-ai.js"></script>
</body>
</html>
