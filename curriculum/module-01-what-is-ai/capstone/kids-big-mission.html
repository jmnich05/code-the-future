<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="/platform/assets/logo-icon-tile.svg">
<link rel="apple-touch-icon" href="/platform/assets/touch-icon.png">
<title>Code the Future — The Big Mission: The Great Escape</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root{
  --display:'Space Grotesk','Trebuchet MS',system-ui,sans-serif;
  --body:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --teal:#26C7D1; --blue:#3D74FF; --amber:#FFB320; --coral:#FF5A38; --green:#3FD08A;
  --ink:#0C1322;
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{ font-family:var(--body); color:#EAF1FF; background:#070C1A; overflow:hidden; }

/* ===== full-screen stage + animated space background ===== */
#stage{ position:fixed; inset:0; overflow:hidden;
  background:radial-gradient(120% 90% at 78% -10%, rgba(38,199,209,.22), transparent 55%),
             radial-gradient(120% 90% at 12% 110%, rgba(61,116,255,.28), transparent 55%),
             linear-gradient(165deg,#0F1B3A 0%,#0A1024 55%,#070C1A 100%); }
.stars{ position:absolute; inset:-20% -20%; pointer-events:none;
  background-repeat:repeat; background-size:340px 340px; }
.stars.s1{ background-image:radial-gradient(1.6px 1.6px at 30px 40px,#fff,transparent),radial-gradient(1.4px 1.4px at 160px 120px,#cfe3ff,transparent),radial-gradient(1.8px 1.8px at 240px 280px,#fff,transparent),radial-gradient(1.2px 1.2px at 90px 250px,#bfe9ff,transparent); opacity:.9; animation:drift 60s linear infinite; }
.stars.s2{ background-size:520px 520px; background-image:radial-gradient(1.2px 1.2px at 80px 90px,#9fc6ff,transparent),radial-gradient(1.5px 1.5px at 400px 300px,#fff,transparent),radial-gradient(1px 1px at 220px 460px,#cbe6ff,transparent); opacity:.55; animation:drift 100s linear infinite reverse; }
.stars.tw{ animation:drift 60s linear infinite, tw 4s ease-in-out infinite; }
@keyframes drift{ to{ transform:translateY(340px); } }
@keyframes tw{ 0%,100%{ opacity:.85 } 50%{ opacity:.45 } }
.planet{ position:absolute; right:-90px; top:8%; width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #5be0ea, #1c7f97 60%, #0c4a5a); opacity:.5;
  box-shadow:0 0 80px rgba(38,199,209,.35); animation:bob 9s ease-in-out infinite; }
@keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-16px) } }

/* ===== shared screen layout ===== */
.screen{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:max(16px,env(safe-area-inset-top)) 18px 18px; text-align:center; opacity:0; transform:translateY(12px);
  transition:opacity .5s ease, transform .5s ease; pointer-events:none; }
.screen.on{ opacity:1; transform:none; pointer-events:auto; }

/* ===== title ===== */
.kicker{ font-family:var(--mono); font-size:13px; letter-spacing:.24em; text-transform:uppercase; color:var(--teal); margin:0 0 14px; }
.t-big{ font-family:var(--display); font-weight:700; line-height:1; margin:0; font-size:clamp(2.6rem,9vw,5.2rem); letter-spacing:-.02em;
  text-shadow:0 6px 40px rgba(38,199,209,.4); }
.t-big .grad{ background:linear-gradient(110deg,#7FE3FF,#3D74FF 55%,#9B7BFF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.lede{ max-width:30ch; font-size:1.12rem; opacity:.92; margin:18px 0 6px; line-height:1.5; }
.btn{ font-family:var(--display); font-weight:700; font-size:1.15rem; color:#06122b; border:none; cursor:pointer;
  padding:16px 34px; border-radius:999px; background:linear-gradient(120deg,#7FE3FF,#3D74FF); box-shadow:0 14px 34px rgba(61,116,255,.5);
  transition:transform .12s ease, box-shadow .2s ease; }
.btn:hover{ transform:translateY(-2px); box-shadow:0 18px 40px rgba(61,116,255,.6); }
.btn:active{ transform:translateY(0); }
.btn.amber{ background:linear-gradient(120deg,#FFD479,#FF9F1C); box-shadow:0 14px 34px rgba(255,159,28,.5); }
.btn.ghost{ background:transparent; color:#EAF1FF; border:2px solid rgba(255,255,255,.5); box-shadow:none; }
.btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.mini{ margin-top:18px; font-size:.92rem; opacity:.7; }
.charpod{ width:118px; height:118px; border-radius:26px; overflow:hidden; margin:6px auto 0; box-shadow:0 16px 40px rgba(0,0,0,.45);
  animation:bob 4s ease-in-out infinite; }
.charpod svg{ width:100%; height:100%; display:block; }

/* ===== board: the AI Lab (full-screen escape scene) ===== */
#board{ justify-content:flex-start; align-items:stretch; padding:0; }
.lab{ position:relative; flex:1 1 auto; width:100%; min-height:320px; overflow:hidden; --acc:#3D74FF;
  background:radial-gradient(80% 60% at 50% 0%, rgba(255,255,255,.05), transparent 60%), linear-gradient(180deg,#0c1733 0%,#0a1228 60%,#080d1e 100%); }
.lab .racks{ position:absolute; inset:0 0 28% 0; opacity:.5;
  background:repeating-linear-gradient(90deg, rgba(127,227,255,.06) 0 6px, transparent 6px 14px, rgba(0,0,0,.22) 14px 18px, transparent 18px 120px); }
.lab .racklights{ position:absolute; inset:0 0 30% 0; opacity:.85;
  background-image:radial-gradient(2px 2px at 40px 30%, var(--acc), transparent), radial-gradient(2px 2px at 150px 56%, #7FE3FF, transparent), radial-gradient(2px 2px at 250px 20%, #FFD479, transparent), radial-gradient(2px 2px at 350px 62%, var(--acc), transparent);
  background-size:420px 100%; animation:rackblink 2.6s steps(2) infinite; }
@keyframes rackblink{ 50%{ opacity:.35 } }
.lab .glow{ position:absolute; left:50%; top:8%; width:64%; height:64%; transform:translateX(-50%); pointer-events:none;
  background:radial-gradient(circle, var(--acc), transparent 62%); filter:blur(26px); opacity:.3; transition:background .5s, opacity .5s; }
.lab .floor{ position:absolute; left:0; right:0; bottom:0; height:30%; background:linear-gradient(0deg,#0a1430,#0a1430);
  border-top:2px solid rgba(127,227,255,.2); }
.lab .floor::before{ content:''; position:absolute; inset:0; opacity:.4;
  background:repeating-linear-gradient(90deg, transparent 0 38px, rgba(127,227,255,.12) 38px 40px); }

.sector-tag{ position:absolute; top:12px; left:14px; z-index:6; font-family:var(--mono); font-size:11.5px; letter-spacing:.14em; text-transform:uppercase;
  color:#cfe3ff; background:rgba(8,14,30,.62); border:1px solid rgba(127,227,255,.25); border-radius:8px; padding:6px 10px; }
.sector-tag b{ color:var(--acc); }
.escape-hud{ position:absolute; top:12px; right:14px; z-index:6; display:flex; align-items:center; gap:9px;
  background:rgba(8,14,30,.62); border:1px solid rgba(127,227,255,.25); border-radius:10px; padding:7px 11px; }
.escape-hud .lamp{ width:11px; height:11px; border-radius:50%; background:#2f7d5f; box-shadow:0 0 8px #3FD08A; }
.escape-hud.alert .lamp{ background:#FF5A38; box-shadow:0 0 12px #FF5A38; animation:lamp .4s steps(2) infinite; }
@keyframes lamp{ 50%{ opacity:.3 } }
.escape-hud .emeter{ width:104px; height:9px; border-radius:99px; background:rgba(255,255,255,.14); overflow:hidden; }
.escape-hud .emeter i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#3FD08A,#7FE3FF); transition:width .6s var(--ease,cubic-bezier(.22,1,.36,1)); }
.escape-hud .epct{ font-family:var(--display); font-weight:700; font-size:.82rem; }

.hero{ position:absolute; left:50%; bottom:21%; width:140px; height:140px; margin-left:-70px; z-index:4; border-radius:24px; overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,.5); border:3px solid rgba(255,255,255,.6); animation:bob 3.4s ease-in-out infinite; }
.hero svg{ width:100%; height:100%; display:block; }
@media (max-width:560px){ .hero{ width:104px; height:104px; margin-left:-52px; } }
.hero.cheer{ animation:cheer .7s var(--ease-spring,cubic-bezier(.34,1.56,.64,1)); }
@keyframes cheer{ 0%{ transform:translateY(0) } 40%{ transform:translateY(-42px) rotate(-4deg) scale(1.05) } 100%{ transform:translateY(0) } }
.hero.stumble{ animation:stumble .6s ease; }
@keyframes stumble{ 0%{ transform:translate(0,0) } 22%{ transform:translate(-30px,0) rotate(-9deg) } 50%{ transform:translate(-22px,0) rotate(-9deg) } 80%{ transform:translate(0,0) rotate(0) } }
.hero-light{ position:absolute; left:50%; bottom:18%; width:200px; height:44px; margin-left:-100px; z-index:3; border-radius:50%;
  background:radial-gradient(circle, var(--acc), transparent 70%); filter:blur(7px); opacity:.45; transition:background .5s; }

.sentinel{ position:absolute; top:15%; right:15%; width:88px; height:78px; z-index:5; animation:patrol 5s ease-in-out infinite; }
@keyframes patrol{ 0%,100%{ transform:translate(0,0) } 50%{ transform:translate(-26px,12px) } }
.sentinel .rotor{ position:absolute; left:50%; top:4px; width:48px; height:8px; margin-left:-24px; border-radius:99px; background:rgba(127,227,255,.5); animation:rotor .25s linear infinite; }
@keyframes rotor{ 50%{ transform:scaleX(.4); opacity:.7 } }
.sentinel .hull{ position:absolute; left:50%; top:14px; width:74px; height:44px; margin-left:-37px; border-radius:24px;
  background:linear-gradient(160deg,#5a6b92,#2c3756); box-shadow:0 8px 18px rgba(0,0,0,.45), inset 0 2px 0 rgba(255,255,255,.15); }
.sentinel .eye{ position:absolute; left:50%; top:24px; width:26px; height:26px; margin-left:-13px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #d6fbff, var(--teal) 60%, #0E9099); box-shadow:0 0 12px var(--teal); transition:background .2s, box-shadow .2s; }
.sentinel .pupil{ position:absolute; left:50%; top:31px; width:9px; height:9px; margin-left:-4px; border-radius:50%; background:#06121f; }
.sentinel.mad .eye{ background:radial-gradient(circle at 40% 35%, #ffd2c8, #FF5A38 60%, #b3260f); box-shadow:0 0 16px #FF5A38; }
.sentinel.mad{ animation:madshake .12s linear infinite; }
@keyframes madshake{ 0%{ transform:translate(0,0) } 50%{ transform:translate(2px,-2px) } 100%{ transform:translate(-2px,2px) } }
.zap{ position:absolute; height:4px; z-index:5; transform-origin:left center; opacity:0;
  background:linear-gradient(90deg,#FF5A38,#FFD479); box-shadow:0 0 10px #FF5A38; }
.zap.fire{ animation:zap .5s ease; }
@keyframes zap{ 0%{ opacity:0; transform:scaleX(0) } 30%{ opacity:1; transform:scaleX(1) } 100%{ opacity:0; transform:scaleX(1) } }

.blastdoor{ position:absolute; right:0; top:0; bottom:30%; width:66px; z-index:2; }
.blastdoor .leaf{ position:absolute; left:0; right:0; height:50%; transition:transform .5s ease; box-shadow:inset 0 0 0 2px rgba(0,0,0,.4);
  background:repeating-linear-gradient(45deg,#FFB320 0 13px,#23304f 13px 26px); }
.blastdoor .leaf.t{ top:0; } .blastdoor .leaf.b{ bottom:0; }
.blastdoor.open .leaf.t{ transform:translateY(-100%); } .blastdoor.open .leaf.b{ transform:translateY(100%); }

.alarm{ position:absolute; inset:0; z-index:7; pointer-events:none; opacity:0;
  background:radial-gradient(120% 90% at 50% 50%, transparent 38%, rgba(255,40,20,.42)); box-shadow:inset 0 0 80px rgba(255,40,20,.5); }
.alarm.on{ animation:alarm 1.5s ease; }
@keyframes alarm{ 0%,100%{ opacity:0 } 15%,45%,75%{ opacity:1 } 30%,60%{ opacity:.2 } }
.wipe{ position:absolute; inset:0; z-index:8; pointer-events:none; transform:translateX(-110%);
  background:linear-gradient(90deg, transparent, rgba(127,227,255,.45), transparent); }
.wipe.go{ animation:wipe .7s ease; }
@keyframes wipe{ to{ transform:translateX(110%) } }
.toast{ position:absolute; top:28%; left:50%; z-index:9; opacity:0; max-width:80%; transform:translate(-50%,0);
  font-family:var(--display); font-weight:700; font-size:1.05rem; text-align:center; padding:11px 18px; border-radius:14px;
  background:rgba(8,14,30,.88); border:1px solid rgba(127,227,255,.4); box-shadow:0 16px 40px rgba(0,0,0,.5); }
.toast.show{ animation:toast 1.8s ease; }
@keyframes toast{ 0%{ opacity:0; transform:translate(-50%,8px) } 12%,80%{ opacity:1; transform:translate(-50%,-6px) } 100%{ opacity:0; transform:translate(-50%,-18px) } }

.terminal{ width:100%; display:flex; justify-content:center; padding:14px 16px max(14px,env(safe-area-inset-bottom));
  background:linear-gradient(180deg, transparent, rgba(6,10,22,.55) 35%); }

/* ===== question card ===== */
.qcard{ width:100%; max-width:680px; background:rgba(12,20,40,.72); backdrop-filter:blur(8px);
  border:1px solid rgba(127,227,255,.25); border-radius:22px; padding:18px 18px 20px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.qtag{ font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); margin:0 0 8px; }
.qtext{ font-family:var(--display); font-weight:700; font-size:clamp(1.15rem,3.4vw,1.5rem); line-height:1.25; margin:0 0 14px; }
.opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width:520px){ .opts{ grid-template-columns:1fr; } }
.opt{ font-family:var(--body); font-weight:600; font-size:1rem; text-align:left; color:#EAF1FF; cursor:pointer;
  background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); border-radius:14px; padding:13px 15px; transition:background .14s, border-color .14s, transform .1s; }
.opt:hover{ background:rgba(127,227,255,.14); border-color:rgba(127,227,255,.5); }
.opt:disabled{ cursor:default; }
.opt.right{ background:rgba(63,208,138,.22); border-color:var(--green); }
.opt.wrong{ background:rgba(255,90,56,.18); border-color:var(--coral); }
.qfb{ min-height:1.4em; margin-top:12px; font-weight:700; font-size:1rem; opacity:0; transition:opacity .2s; }
.qfb.show{ opacity:1; }
.qfb.good{ color:#7FF0B8; } .qfb.bad{ color:#FFC0A8; }
.qcard.event{ text-align:center; }
.qcard.event .qtext{ font-size:clamp(1.05rem,3.2vw,1.32rem); margin-bottom:12px; }
.qcard.event.good{ border-color:rgba(63,208,138,.5); }
.qcard.event.bad{ border-color:rgba(255,90,56,.5); }
.qcard.event.choice{ border-color:rgba(155,123,255,.5); }
.opt.evbtn{ display:block; width:100%; text-align:center; font-family:var(--display); font-weight:700; background:rgba(127,227,255,.12); border-color:rgba(127,227,255,.4); }

/* ===== finale: design the ship ===== */
.panel{ width:100%; max-width:640px; background:rgba(12,20,40,.7); border:1px solid rgba(127,227,255,.25);
  border-radius:22px; padding:22px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:4px 0 12px; }
.chip{ font-family:var(--display); font-weight:600; font-size:.9rem; color:#cfe3ff; cursor:pointer;
  background:rgba(127,227,255,.1); border:1.5px solid rgba(127,227,255,.3); border-radius:999px; padding:8px 13px; transition:background .14s, transform .1s; }
.chip:hover{ background:rgba(127,227,255,.2); transform:translateY(-1px); }
.ta{ width:100%; min-height:84px; resize:vertical; font-family:var(--body); font-size:1.05rem; color:#fff;
  background:rgba(255,255,255,.06); border:1.5px solid rgba(127,227,255,.35); border-radius:16px; padding:14px; outline:none; }
.ta:focus{ border-color:#7FE3FF; box-shadow:0 0 0 4px rgba(127,227,255,.18); }
.ta::placeholder{ color:rgba(207,227,255,.5); }
.blueprint{ margin-top:14px; text-align:left; font-family:var(--mono); font-size:.95rem; line-height:1.6; color:#CFE9FF;
  background:linear-gradient(180deg, rgba(8,30,60,.6), rgba(8,20,44,.6)); border:1px dashed rgba(127,227,255,.45); border-radius:14px;
  padding:16px; max-height:0; overflow:hidden; opacity:0; transition:max-height .7s ease, opacity .4s; }
.blueprint.show{ max-height:420px; opacity:1; }
.blueprint .bh{ font-family:var(--display); color:#7FE3FF; letter-spacing:.1em; font-size:.8rem; margin-bottom:8px; }
.spin{ display:inline-block; width:16px; height:16px; border:3px solid rgba(127,227,255,.3); border-top-color:#7FE3FF; border-radius:50%; animation:sp .8s linear infinite; vertical-align:-3px; }
@keyframes sp{ to{ transform:rotate(360deg) } }

/* ===== launch ===== */
#launch{ }
.launchpod{ position:absolute; left:50%; bottom:-140px; width:120px; margin-left:-60px; }
.launchpod.go{ animation:liftoff 3.2s cubic-bezier(.5,0,.85,.3) forwards; }
@keyframes liftoff{ 0%{ transform:translateY(0) } 16%{ transform:translateY(8px) } 100%{ transform:translateY(-128vh) } }
.launchpod .rk{ position:relative; width:120px; height:210px; margin:0 auto; }
.launchpod .rk .body{ position:absolute; left:50%; bottom:42px; width:84px; height:130px; margin-left:-42px; border-radius:42px 42px 18px 18px; background:linear-gradient(120deg,#EAF1FF,#9fb6e6); }
.launchpod .rk .nose{ position:absolute; left:50%; bottom:158px; margin-left:-42px; width:0; height:0; border-left:42px solid transparent; border-right:42px solid transparent; border-bottom:52px solid #FF7A4D; }
.launchpod .rk .port{ position:absolute; left:50%; bottom:104px; width:54px; height:54px; margin-left:-27px; border-radius:16px; overflow:hidden; background:#173b6e; box-shadow:inset 0 0 0 4px #7FE3FF; }
.launchpod .rk .port svg{ width:100%; height:100%; display:block; }
.launchpod .rk .fin{ position:absolute; bottom:36px; width:28px; height:54px; background:#FF7A4D; border-radius:8px; }
.launchpod .rk .fin.l{ left:6px; transform:skewX(20deg); } .launchpod .rk .fin.r{ right:6px; transform:skewX(-20deg); }
.flame{ position:absolute; left:50%; bottom:4px; width:46px; height:0; margin-left:-23px; border-radius:0 0 30px 30px;
  background:linear-gradient(#FFE08A,#FF9F1C 50%,#FF5A38); filter:blur(1px); opacity:0; }
.launchpod.go .flame{ animation:flame .14s ease-in-out infinite alternate, flameon .3s .2s forwards; }
@keyframes flameon{ to{ opacity:1 } }
@keyframes flame{ from{ height:60px } to{ height:110px } }
.shake{ animation:shake .12s linear infinite; }
@keyframes shake{ 0%{ transform:translate(0,0) } 25%{ transform:translate(-3px,2px) } 50%{ transform:translate(3px,-2px) } 75%{ transform:translate(-2px,-2px) } 100%{ transform:translate(2px,2px) } }
.confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.confetti i{ position:absolute; top:-12px; width:9px; height:14px; border-radius:2px; animation:fall linear forwards; }
@keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:.9 } }

/* ===== credits ===== */
#credits{ overflow:hidden; }
.crawl{ position:absolute; left:0; right:0; bottom:-10%; display:flex; flex-direction:column; align-items:center; gap:26px; padding:0 18px;
  animation:crawl 26s linear forwards; }
@keyframes crawl{ from{ transform:translateY(0) } to{ transform:translateY(-160%) } }
.crawl .cr-title{ font-family:var(--display); font-weight:700; font-size:clamp(1.8rem,6vw,3rem); color:#7FE3FF; }
.crawl .cr-role{ font-family:var(--mono); font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); margin-bottom:6px; }
.crawl > div{ display:flex; flex-direction:column; align-items:center; gap:2px; }
.crawl .cr-name{ font-family:var(--display); font-weight:700; font-size:1.5rem; }
.crawl .cr-badge{ width:120px; height:120px; border-radius:28px; overflow:hidden; box-shadow:0 16px 40px rgba(0,0,0,.5); }
.crawl .cr-badge svg{ width:100%; height:100%; display:block; }
.credits-skip{ position:absolute; bottom:22px; left:50%; transform:translateX(-50%); z-index:5; }

/* ===== outro: what's next + parent report ===== */
#outro{ justify-content:center; }
.cards{ display:flex; gap:18px; flex-wrap:wrap; justify-content:center; max-width:880px; width:100%; }
.card2{ flex:1 1 360px; max-width:430px; text-align:left; background:rgba(12,20,40,.72); border:1px solid rgba(127,227,255,.25);
  border-radius:22px; padding:22px 24px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.card2 .sub{ font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--teal); margin:0 0 6px; }
.card2 h3{ font-family:var(--display); font-weight:700; font-size:1.45rem; margin:0 0 12px; }
.card2 ul{ margin:0; padding-left:18px; }
.card2 li{ margin:9px 0; line-height:1.45; font-size:1rem; }
.card2 .pet{ margin-top:14px; padding:11px 13px; border-radius:13px; background:rgba(127,227,255,.1); border:1px dashed rgba(127,227,255,.45); font-weight:600; }
.outro-actions{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:24px; }

/* the printable parent report (overlay on screen, clean sheet on paper) */
.report{ position:fixed; inset:0; z-index:9999; background:rgba(7,12,26,.9); overflow:auto; padding:24px; }
.report[hidden]{ display:none; }
.sheet{ max-width:740px; margin:0 auto; background:#fff; color:#1B2233; border-radius:18px; padding:42px 46px;
  box-shadow:0 30px 80px rgba(0,0,0,.5); font-family:var(--body); border-top:8px solid #3D74FF; }
.sheet .brand{ font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:#0E9099; }
.sheet h1{ font-family:var(--display); font-size:2rem; line-height:1.1; margin:6px 0 2px; color:#0C1322; }
.sheet .modline{ color:#5F6B82; font-weight:600; margin:0 0 16px; }
.sheet .awarded{ display:flex; align-items:center; gap:14px; padding:14px 0; border-top:2px solid #ECEFF5; border-bottom:2px solid #ECEFF5; margin:8px 0 18px; }
.sheet .awarded .nm{ font-family:var(--display); font-weight:700; font-size:1.5rem; color:#1E45C2; }
.sheet .awarded .meta{ font-size:.92rem; color:#5F6B82; }
.sheet .seal{ width:64px; height:64px; border-radius:14px; overflow:hidden; flex:0 0 auto; box-shadow:0 6px 16px rgba(12,19,34,.18); }
.sheet .seal svg{ width:100%; height:100%; display:block; }
.sheet h2{ font-family:var(--display); font-size:1.1rem; color:#0C1322; margin:20px 0 8px; }
.sheet ul{ margin:0; padding-left:20px; } .sheet li{ margin:6px 0; line-height:1.45; font-size:.98rem; }
.sheet .two{ display:grid; grid-template-columns:1fr 1fr; gap:8px 28px; }
@media (max-width:560px){ .sheet .two{ grid-template-columns:1fr; } .sheet{ padding:30px 24px; } }
.sheet .pnote{ margin-top:18px; padding:16px 18px; background:#F6F8FC; border-radius:12px; font-size:.95rem; }
.sheet .pnote b{ color:#1E45C2; }
.sheet .foot{ margin-top:22px; padding-top:14px; border-top:2px solid #ECEFF5; font-size:.85rem; color:#8A93A8; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.report-bar{ position:sticky; top:0; z-index:2; max-width:740px; margin:0 auto 14px; padding:6px 0; display:flex; gap:10px; justify-content:flex-end; }

@media print {
  body{ background:#fff !important; }
  #stage{ display:none !important; }
  .no-print{ display:none !important; }
  .report{ position:static; background:#fff; padding:0; overflow:visible; }
  .sheet{ box-shadow:none; border-radius:0; max-width:none; border-top:6px solid #3D74FF; padding:0 6px; }
}

@media (prefers-reduced-motion:reduce){
  .stars,.planet,.charpod,.launchpod,.flame,.shake,.crawl,.confetti i,
  .hero,.sentinel,.sentinel .rotor,.racklights,.hero.cheer,.hero.stumble{ animation:none !important; }
  .launchpod.go{ transform:translateY(-128vh); transition:transform 2s ease-in; }
  .crawl{ position:static; transform:none; padding:30px 18px; }
}
</style>
</head>
<body>
<div id="stage">
  <div class="stars s1"></div>
  <div class="stars s2 tw"></div>
  <div class="planet"></div>

  <!-- screens get injected here -->
  <section id="title" class="screen on"></section>
  <section id="board" class="screen"></section>
  <section id="finale" class="screen"></section>
  <section id="launch" class="screen"></section>
  <section id="credits" class="screen"></section>
  <section id="outro" class="screen"></section>
</div>
<div id="report" class="report" hidden></div>

<script src="/platform/lib/avatar.js"></script>
<script src="/platform/lib/filter.js"></script>
<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  function el(tag, cls, html){ var n=document.createElement(tag); if(cls) n.className=cls; if(html!=null) n.innerHTML=html; return n; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // ---- who is escaping: the kid's own avatar + name -----------------------
  function loadProfile(){
    try{ var p=JSON.parse(localStorage.getItem('ctf:profile')||'null'); if(p) return p; }catch(e){}
    return {};
  }
  var profile = loadProfile();
  var AV = (window.CTFAvatar) ? (profile.avatar && Object.keys(profile.avatar||{}).length ? profile.avatar : window.CTFAvatar.DEFAULT) : null;
  var avatarSVG = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '🧑‍🚀';
  var heroName = (profile.display_name || 'Commander').toString().slice(0,24);

  // ---- the 10 recap questions (one per big idea across the module) ---------
  var QUESTIONS = [
    { tag:'Mission 2', q:'What makes AI different from a toaster?', o:['It is faster','It can learn from examples','It is bigger','It uses electricity'], a:1, why:'AI learns from examples — a toaster just follows fixed steps.' },
    { tag:'Mission 3', q:'How did YOU learn what a dog is — the same way AI learns?', o:['By reading a rulebook','By seeing lots of examples','By guessing once','By being born knowing'], a:1, why:'You saw lots of dogs and spotted the pattern. AI does the same!' },
    { tag:'Mission 4', q:'The examples an AI learns from are called…', o:['Homework','Data','Snacks','Pixels'], a:1, why:'Examples = data. Teaching with them is called training.' },
    { tag:'Mission 4', q:'Teaching an AI by showing it examples is called…', o:['Training','Charging','Downloading','Printing'], a:0, why:'Showing examples so it learns the pattern is training.' },
    { tag:'Mission 5', q:'An AI learns to SEE by finding patterns in…', o:['Sounds','Pixels','Smells','Magnets'], a:1, why:'Images are made of pixels — AI finds patterns in them.' },
    { tag:'Mission 6', q:'How does a chatbot build its answers?', o:['It looks them up in a book','It guesses the next word, over and over','It asks a teacher','It copies the internet exactly'], a:1, why:'It predicts the next word again and again — next-word guessing!' },
    { tag:'Mission 7', q:'The clever focus trick that powers transformers is called…', o:['Concentration','Attention','Meditation','Detection'], a:1, why:'Attention lets AI focus on the words that matter most.' },
    { tag:'Mission 8', q:'A neural network is…', o:['A real living brain','A web of pretend neurons that learns by changing connections','A fishing net for robots','A kind of wifi'], a:1, why:'It is inspired by the brain — but it is NOT alive and has no feelings.' },
    { tag:'Mission 9', q:'AI got amazingly good…', o:['Hundreds of years ago','Only recently','It never did','In the year 1900'], a:1, why:'It took a long time — the big leaps happened just recently.' },
    { tag:'Mission 10', q:'When AI sounds super sure but is WRONG, who is in charge of checking?', o:['The AI','Nobody','You are!','The internet'], a:2, why:'Confident is not the same as correct — you stay the boss.' }
  ];
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  // ---- game state ----------------------------------------------------------
  var GOAL = 6;            // rocket sits at tile index GOAL (tiles 0..GOAL)
  var pos = 0;             // where the character stands
  var asked = 0, correct = 0;
  var MAXQ = 18;           // safety cap so nobody gets stuck forever
  var bank = shuffle(QUESTIONS), bi = 0;

  function show(id){
    ['title','board','finale','launch','credits','outro'].forEach(function(s){ $(s).classList.toggle('on', s===id); });
  }

  // ======================= TITLE ===========================================
  function renderTitle(){
    var s = $('title');
    s.innerHTML = '';
    s.appendChild(el('p','kicker','🚀 The Big Mission · Module 1'));
    s.appendChild(el('h1','t-big','The <span class="grad">Great Escape</span>'));
    s.appendChild(el('p','lede','You are locked deep inside the AI Lab, '+esc(heroName)+'! Crack the lab terminals to blast through each sector toward the Launch Bay. Answer right and a door flies open — answer wrong and a Sentinel drags you back. Watch for surprise lab events! Reach the rocket, design your ship, and ESCAPE.'));
    var pod = el('div','charpod'); pod.innerHTML = avatarSVG; s.appendChild(pod);
    var go = el('button','btn','▶  Enter the lab');
    go.style.marginTop = '20px';
    go.addEventListener('click', startBoard);
    s.appendChild(go);
    s.appendChild(el('p','mini','6 sectors · lab terminals, surprise events, and one Sentinel between you and freedom.'));
  }

  // ======================= BOARD: escape the AI Lab ========================
  // A full-screen lab scene. The hero (the kid's avatar) is centre stage; a
  // Sentinel drone guards the exit. Right answers blast a door open and move
  // them to the next themed SECTOR; wrong answers trip the alarm and the
  // Sentinel drags them back. Random "lab events" add forks and surprises.
  var SECTORS = [
    { name:'Holding Cell',  acc:'#3D74FF' },
    { name:'Data Vault',    acc:'#26C7D1' },
    { name:'Training Room', acc:'#9B7BFF' },
    { name:'Vision Lab',    acc:'#FF8A5C' },
    { name:'Language Core', acc:'#3FD08A' },
    { name:'Neural Hub',    acc:'#FF6CA6' },
    { name:'Launch Bay',    acc:'#FFD479' }
  ];
  var lab, hero, sentinel, zapEl, blast, alarmEl, wipeEl, toastEl, sectorTag, emeterFill, epctEl, escHud, qhost;
  var busyTurn = false;

  function buildLab(){
    var s = $('board'); s.innerHTML='';
    lab = el('div','lab');
    lab.innerHTML =
      '<div class="racks"></div><div class="racklights"></div><div class="glow"></div>'+
      '<div class="blastdoor"><div class="leaf t"></div><div class="leaf b"></div></div>'+
      '<div class="floor"></div>'+
      '<div class="sector-tag"></div>'+
      '<div class="escape-hud"><span class="lamp"></span><div class="emeter"><i></i></div><span class="epct">0%</span></div>'+
      '<div class="sentinel"><div class="rotor"></div><div class="hull"></div><div class="eye"></div><div class="pupil"></div></div>'+
      '<div class="hero-light"></div><div class="zap"></div>'+
      '<div class="hero"></div>'+
      '<div class="alarm"></div><div class="wipe"></div><div class="toast"></div>';
    s.appendChild(lab);
    var term = el('div','terminal'); qhost = el('div'); qhost.style.cssText='width:100%;display:flex;justify-content:center;';
    term.appendChild(qhost); s.appendChild(term);

    hero = lab.querySelector('.hero'); hero.innerHTML = avatarSVG;
    sentinel = lab.querySelector('.sentinel'); zapEl = lab.querySelector('.zap'); blast = lab.querySelector('.blastdoor');
    alarmEl = lab.querySelector('.alarm'); wipeEl = lab.querySelector('.wipe'); toastEl = lab.querySelector('.toast');
    sectorTag = lab.querySelector('.sector-tag'); emeterFill = lab.querySelector('.emeter i'); epctEl = lab.querySelector('.epct'); escHud = lab.querySelector('.escape-hud');
    paintSector();
  }
  function paintSector(){
    var sec = SECTORS[Math.max(0, Math.min(GOAL, pos))];
    lab.style.setProperty('--acc', sec.acc);
    sectorTag.innerHTML = 'Sector '+pos+' / '+GOAL+' · <b>'+esc(sec.name)+'</b>';
    var p = Math.round((pos/GOAL)*100);
    emeterFill.style.width = p+'%'; epctEl.textContent = p+'%';
  }
  function toast(msg){ toastEl.innerHTML = msg; toastEl.classList.remove('show'); void toastEl.offsetWidth; toastEl.classList.add('show'); }

  function startBoard(){ show('board'); buildLab(); setTimeout(nextTurn, 650); }

  function nextTurn(){
    if(pos >= GOAL){ setTimeout(startFinale, 450); return; }
    if(asked >= MAXQ){ toast('🚀 An escape pod boosts you to the Launch Bay!'); advance(GOAL-pos); setTimeout(startFinale, 1500); return; }
    // ~28% of turns (never the first) are a surprise lab event
    if(asked > 0 && Math.random() < 0.28){ labEvent(); return; }
    askQuestion();
  }

  function nextQ(){ if(bi>=bank.length){ bank=shuffle(QUESTIONS); bi=0; } return bank[bi++]; }

  function askQuestion(){
    var Q = nextQ();
    var card = el('div','qcard');
    card.appendChild(el('p','qtag','⌨ LAB TERMINAL · '+esc(Q.tag)));
    card.appendChild(el('h2','qtext', esc(Q.q)));
    var opts = el('div','opts');
    Q.o.forEach(function(text, i){
      var b = el('button','opt', esc(text));
      b.addEventListener('click', function(){ answer(Q, i, opts, fb); });
      opts.appendChild(b);
    });
    card.appendChild(opts);
    var fb = el('div','qfb'); card.appendChild(fb);
    qhost.innerHTML=''; qhost.appendChild(card);
  }

  function answer(Q, choice, opts, fb){
    if(busyTurn) return; busyTurn = true;
    var btns = opts.querySelectorAll('.opt'); btns.forEach(function(b){ b.disabled=true; });
    var right = (choice===Q.a);
    btns[Q.a].classList.add('right'); if(!right) btns[choice].classList.add('wrong');
    asked++;
    if(right){ correct++; fb.className='qfb show good'; fb.textContent='✅ '+Q.why; advance(1); }
    else { fb.className='qfb show bad'; fb.textContent='🚨 Security override! '+Q.why; setback(); }
    setTimeout(function(){ busyTurn=false; nextTurn(); }, right ? 1700 : 2100);
  }

  // --- outcomes -----------------------------------------------------------
  function advance(n){
    pos = Math.min(GOAL, pos + (n||1));
    blast.classList.add('open');
    hero.classList.remove('cheer'); void hero.offsetWidth; hero.classList.add('cheer');
    setTimeout(function(){
      wipeEl.classList.remove('go'); void wipeEl.offsetWidth; wipeEl.classList.add('go');
      setTimeout(paintSector, 330);                 // change room at the peak of the wipe
      setTimeout(function(){ blast.classList.remove('open'); }, 720);
    }, 360);
  }
  function setback(){
    pos = Math.max(0, pos - 1);
    escHud.classList.add('alert');
    alarmEl.classList.remove('on'); void alarmEl.offsetWidth; alarmEl.classList.add('on');
    sentinel.classList.add('mad'); fireZap();
    setTimeout(function(){ hero.classList.remove('stumble'); void hero.offsetWidth; hero.classList.add('stumble'); }, 180);
    setTimeout(paintSector, 520);
    setTimeout(function(){ escHud.classList.remove('alert'); sentinel.classList.remove('mad'); }, 1500);
  }
  function fireZap(){
    var lb = lab.getBoundingClientRect(), eb = sentinel.querySelector('.eye').getBoundingClientRect(), hb = hero.getBoundingClientRect();
    var x1 = eb.left+eb.width/2 - lb.left, y1 = eb.top+eb.height/2 - lb.top;
    var x2 = hb.left+hb.width/2 - lb.left, y2 = hb.top+hb.height/3 - lb.top;
    var dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy), ang = Math.atan2(dy,dx)*180/Math.PI;
    zapEl.style.left = x1+'px'; zapEl.style.top = y1+'px'; zapEl.style.width = len+'px'; zapEl.style.transform = 'rotate('+ang+'deg)';
    zapEl.classList.remove('fire'); void zapEl.offsetWidth; zapEl.classList.add('fire');
  }

  // --- random lab events (different decisions & outcomes) -----------------
  var EVENTS = [
    { t:'good', text:'⚡  Power surge! A blast door springs open — you DASH ahead!', d:1 },
    { t:'good', text:'🤖  A friendly cleaner-bot points you to a secret vent — shortcut!', d:1 },
    { t:'good', text:'💾  You swipe a dropped keycard — the next lock clicks open!', d:1 },
    { t:'bad',  text:'🧲  A magnet-bot yanks your keycard away! Security pulls you back.', d:-1 },
    { t:'bad',  text:'🚨  Firewall lockdown! Red lights everywhere — back you go.', d:-1 }
  ];
  function labEvent(){
    if(Math.random() < 0.34){ return doorChoice(); }   // a third of events are a real choice
    var E = EVENTS[Math.floor(Math.random()*EVENTS.length)];
    var card = el('div','qcard event '+E.t);
    card.appendChild(el('p','qtag','⚠ LAB EVENT'));
    card.appendChild(el('h2','qtext', esc(E.text)));
    var go = el('button','opt evbtn', E.d>0 ? 'Go go go! →' : 'Oh no… keep going →');
    card.appendChild(go); card.appendChild(el('div','qfb'));
    qhost.innerHTML=''; qhost.appendChild(card);
    go.addEventListener('click', function(){
      if(busyTurn) return; busyTurn=true; go.disabled=true;
      if(E.d>0){ toast('✨ Shortcut!'); advance(1); } else { setback(); }
      setTimeout(function(){ busyTurn=false; nextTurn(); }, E.d>0 ? 1500 : 2000);
    });
  }
  function doorChoice(){
    var winner = Math.random()<0.5 ? 0 : 1;
    var card = el('div','qcard event choice');
    card.appendChild(el('p','qtag','🚪 DECISION · CHOOSE YOUR ROUTE'));
    card.appendChild(el('h2','qtext','Two doors ahead. Which do you trust?'));
    var opts = el('div','opts');
    var fb = el('div','qfb');
    ['🚪  Left door','🚪  Right door'].forEach(function(lbl, i){
      var b = el('button','opt', lbl);
      b.addEventListener('click', function(){
        if(busyTurn) return; busyTurn=true;
        opts.querySelectorAll('.opt').forEach(function(x){ x.disabled=true; });
        if(i===winner){ b.classList.add('right'); fb.className='qfb show good'; fb.textContent='✅ Clear path — you slip through!'; advance(1); }
        else { b.classList.add('wrong'); opts.querySelectorAll('.opt')[winner].classList.add('right'); fb.className='qfb show bad'; fb.textContent='🚨 A guard-bot was waiting! Back a sector.'; setback(); }
        setTimeout(function(){ busyTurn=false; nextTurn(); }, i===winner ? 1600 : 2100);
      });
      opts.appendChild(b);
    });
    card.appendChild(opts); card.appendChild(fb);
    qhost.innerHTML=''; qhost.appendChild(card);
  }

  // ======================= FINALE: design the ship =========================
  function startFinale(){
    show('finale');
    var s = $('finale'); s.innerHTML='';
    s.appendChild(el('p','kicker','🛠️  Final step · build your getaway ship'));
    s.appendChild(el('h1','t-big', 'Design your <span class="grad">escape ship</span>'));
    s.appendChild(el('p','lede','You made it to the rocket, '+esc(heroName)+'! Tell a REAL AI how to build your ship — what it looks like, what powers it, what it can do. The AI will draw up the blueprint.'));

    var panel = el('div','panel');
    var chips = el('div','chips');
    ['A rocket powered by my curiosity','A ship that turns my drawings into wings','A submarine-rocket that escapes by sea AND sky','A glowing ship made of starlight and code'].forEach(function(idea){
      var c = el('button','chip', esc(idea));
      c.addEventListener('click', function(){ ta.value=idea; ta.focus(); });
      chips.appendChild(c);
    });
    panel.appendChild(chips);
    var ta = el('textarea','ta'); ta.placeholder='My escape ship is… (describe it!)'; ta.maxLength=240;
    panel.appendChild(ta);
    var row = el('div'); row.style.cssText='display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;';
    var build = el('button','btn amber','✨  Build my ship');
    row.appendChild(build); panel.appendChild(row);
    var blue = el('div','blueprint'); panel.appendChild(blue);
    var launchBtn = el('button','btn','🚀  LAUNCH!'); launchBtn.style.cssText='margin-top:16px;display:none;';
    panel.appendChild(launchBtn);
    s.appendChild(panel);

    var busy=false;
    function build_(){
      var q = ta.value.trim();
      if(!q){ ta.focus(); return; }
      if(window.CTFFilter && window.CTFFilter.isClean && !window.CTFFilter.isClean(q)){
        blue.classList.add('show'); blue.innerHTML='<div class="bh">MISSION CONTROL</div>Let\'s keep it kind and fun — describe a cool, friendly ship and try again! 😊';
        return;
      }
      if(busy) return; busy=true; build.disabled=true; build.innerHTML='<span class="spin"></span>  Drawing blueprint…';
      blue.classList.add('show'); blue.innerHTML='<div class="bh">MISSION CONTROL</div>Reading your design…';
      var prompt = 'A kid is designing their escape spaceship to blast out of the AI Lab. They described it as: "'+q+'". In 2-3 short, thrilling sentences for a 9-year-old, describe their awesome custom spaceship like mission control reading the official blueprint. Mention a detail they said, give it one cool AI-powered feature, and end with "Cleared for launch!"';
      fetch('/api/ai', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ mode:'kids', prompt:prompt }) })
        .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
        .then(function(res){
          var text = (res.ok && res.d.text) ? res.d.text : fallbackBlueprint(q);
          showBlueprint(text);
        })
        .catch(function(){ showBlueprint(fallbackBlueprint(q)); });
    }
    function fallbackBlueprint(q){
      return 'Blueprint locked in: your "'+q+'" gleams on the launchpad, its AI core already plotting the perfect escape route through the stars. Engines lit, hatch sealed — Cleared for launch!';
    }
    function showBlueprint(text){
      blue.classList.add('show');
      blue.innerHTML = '<div class="bh">📋 OFFICIAL BLUEPRINT — '+esc(heroName.toUpperCase())+'</div>'+esc(text);
      build.innerHTML='✅ Ship built!'; build.disabled=true; busy=false;
      launchBtn.style.display='inline-block';
      launchBtn.addEventListener('click', doLaunch, { once:true });
      launchBtn.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
    build.addEventListener('click', build_);
  }

  // ======================= LAUNCH ==========================================
  function doLaunch(){
    show('launch');
    var s = $('launch'); s.innerHTML='';
    s.appendChild(el('p','kicker','t-minus 3… 2… 1…'));
    var pod = el('div','launchpod');
    pod.innerHTML =
      '<div class="rk shake"><div class="nose"></div><div class="body"></div>'+
        '<div class="port">'+avatarSVG+'</div><div class="fin l"></div><div class="fin r"></div>'+
        '<div class="flame"></div></div>';
    s.appendChild(pod);
    var conf = el('div','confetti'); s.appendChild(conf);
    // brief countdown shimmer, then liftoff
    setTimeout(function(){
      pod.classList.add('go');
      burst(conf, 70);
    }, 700);
    setTimeout(showCredits, 3600);
  }
  function burst(host, n){
    var colors=['#7FE3FF','#FFD479','#FF7A4D','#3FD08A','#9B7BFF','#fff'];
    for(var i=0;i<n;i++){
      var c=el('i'); c.style.left=Math.random()*100+'%';
      c.style.background=colors[i%colors.length];
      c.style.animationDuration=(1.6+Math.random()*1.8)+'s';
      c.style.animationDelay=(Math.random()*0.5)+'s';
      c.style.transform='rotate('+(Math.random()*360)+'deg)';
      host.appendChild(c);
    }
  }

  // ======================= CREDITS =========================================
  function showCredits(){
    show('credits');
    var s = $('credits'); s.innerHTML='';
    var badge = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '';
    var crawl = el('div','crawl');
    crawl.innerHTML =
      '<div class="cr-title">THE GREAT ESCAPE</div>'+
      '<div class="cr-badge">'+badge+'</div>'+
      '<div><div class="cr-role">Starring</div><div class="cr-name">'+esc(heroName)+'</div><div style="opacity:.8">as the Future Builder</div></div>'+
      '<div><div class="cr-role">Questions answered</div><div class="cr-name">'+correct+' correct 🎯</div></div>'+
      '<div><div class="cr-role">Spaceship designed by</div><div class="cr-name">'+esc(heroName)+' + a real AI 🤖</div></div>'+
      '<div><div class="cr-role">Directed by</div><div class="cr-name">Curiosity</div></div>'+
      '<div><div class="cr-role">Powered by</div><div class="cr-name">Everything you learned in Module 1</div></div>'+
      '<div style="margin-top:8px;font-size:1.2rem;opacity:.92">You officially understand AI — and you just used it to escape.</div>'+
      '<div class="cr-title" style="font-size:clamp(1.4rem,5vw,2.2rem)">Module 1 Complete 🏆</div>';
    s.appendChild(crawl);
    var fin = el('button','btn credits-skip','What’s next  →');
    fin.addEventListener('click', renderOutro);
    s.appendChild(fin);
    // when the credit crawl finishes on its own, glide into the outro
    crawl.addEventListener('animationend', function(){ if($('credits').classList.contains('on')) renderOutro(); });
    try{ localStorage.setItem('ctf:bigmission:done','1'); }catch(e){}
  }

  // ======================= OUTRO: what's next + parent report ===============
  function renderOutro(){
    show('outro');
    var s = $('outro'); s.innerHTML='';
    s.appendChild(el('p','kicker','🎉 Module 1 complete · '+esc(heroName)));
    s.appendChild(el('h1','t-big','You’re a <span class="grad">Future Builder</span>'));

    var cards = el('div','cards'); cards.style.marginTop='22px';

    // --- next week preview ---
    var next = el('div','card2');
    next.innerHTML =
      '<p class="sub">📅 Next week · Module 2</p>'+
      '<h3>AI and Our World</h3>'+
      '<ul>'+
        '<li>See where AI is <b>already</b> helping — doctors, maps, the planet, and more.</li>'+
        '<li>Tackle the big questions: <b>privacy, fairness</b>, and who gets to decide what AI does.</li>'+
        '<li>Become a <b>responsible builder</b> — use AI for good and spot when a tool could hurt.</li>'+
      '</ul>'+
      '<div class="pet">🐾 New reward: adopt a <b>sidekick pet</b> that travels with your character!</div>';
    cards.appendChild(next);

    // --- parent report ---
    var rep = el('div','card2');
    rep.innerHTML =
      '<p class="sub">📄 For your grown-up</p>'+
      '<h3>Your Module 1 Report</h3>'+
      '<ul>'+
        '<li>A printable certificate showing <b>what you learned</b> and the <b>skills you practiced</b>.</li>'+
        '<li>Conversation starters so you can <b>teach a grown-up</b> what AI really is.</li>'+
      '</ul>';
    var pbtn = el('button','btn amber','🖨️  Print my report');
    pbtn.style.marginTop='14px';
    pbtn.addEventListener('click', openReport);
    rep.appendChild(pbtn);
    cards.appendChild(rep);
    s.appendChild(cards);

    var actions = el('div','outro-actions');
    var back = el('button','btn','Back to Missions  →');
    back.addEventListener('click', function(){ try{ localStorage.setItem('ctf:bigmission:done','1'); }catch(e){} location.href='/platform/missions.html'; });
    actions.appendChild(back);
    s.appendChild(actions);
    try{ localStorage.setItem('ctf:bigmission:done','1'); }catch(e){}
  }

  function openReport(){
    var when = new Date().toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
    var seal = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '';
    var r = $('report');
    r.innerHTML =
      '<div class="report-bar no-print">'+
        '<button class="btn amber" id="rp-print">🖨️  Print this</button>'+
        '<button class="btn ghost" id="rp-close">Close</button>'+
      '</div>'+
      '<div class="sheet">'+
        '<div class="brand">◆ Code the Future · Certificate of Completion</div>'+
        '<h1>Module 1 — What Is AI?</h1>'+
        '<p class="modline">A 12-mission journey into how AI learns, thinks, and gets things done.</p>'+
        '<div class="awarded">'+
          '<div class="seal">'+seal+'</div>'+
          '<div><div class="nm">'+esc(heroName)+'</div>'+
          '<div class="meta">Completed '+esc(when)+' · Final challenge: '+correct+' / 10 correct 🎯</div></div>'+
        '</div>'+
        '<h2>What I learned</h2>'+
        '<ul>'+
          '<li><b>AI learns from examples</b> instead of only following fixed rules — unlike a toaster.</li>'+
          '<li>AI finds <b>patterns</b>, the same way I learned what a dog is. The examples are called <b>data</b>, and teaching it is <b>training</b>.</li>'+
          '<li>AI can learn to <b>see</b> (patterns in pixels) and use <b>words</b> (guessing the next word, over and over).</li>'+
          '<li>The focus trick behind chatbots is <b>attention</b> — that kind of AI is a <b>transformer</b>.</li>'+
          '<li>AI runs on a <b>neural network</b> inspired by the brain — but it is <b>not alive</b> and has <b>no feelings</b>.</li>'+
          '<li>AI is powerful but can be <b>confidently wrong</b>, so a human <b>stays the boss</b> and checks its work.</li>'+
          '<li>I <b>used a real AI myself</b> to design and launch my escape ship!</li>'+
        '</ul>'+
        '<h2>Skills I practiced</h2>'+
        '<ul class="two">'+
          '<li>Pattern recognition &amp; logical thinking</li>'+
          '<li>Critical thinking &amp; fact-checking</li>'+
          '<li>Writing clear prompts for an AI</li>'+
          '<li>Using real AI tools responsibly</li>'+
          '<li>Persistence &amp; problem-solving</li>'+
          '<li>Explaining ideas in my own words</li>'+
        '</ul>'+
        '<div class="pnote"><b>For grown-ups:</b> Ask me to explain one of these ideas — teaching it shows I really get it. Try: “How is AI different from a toaster?” · “What is AI great at, and what is it bad at?” · “Why should a human always check what an AI says?”</div>'+
        '<div class="foot"><span>Code the Future · codethefuture.net</span><span>Next up: Module 2 — AI and Our World</span></div>'+
      '</div>';
    r.hidden = false;
    $('rp-print').addEventListener('click', function(){ window.print(); });
    $('rp-close').addEventListener('click', function(){ r.hidden = true; r.innerHTML=''; });
  }

  // ---- boot ----------------------------------------------------------------
  renderTitle();
})();
</script>
