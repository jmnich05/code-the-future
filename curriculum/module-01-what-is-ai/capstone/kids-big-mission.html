<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="/platform/assets/logo-icon-tile.svg">
<link rel="apple-touch-icon" href="/platform/assets/touch-icon.png">
<title>Code the Future — The Big Mission: The Great Escape</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root{
  --display:'Space Grotesk','Trebuchet MS',system-ui,sans-serif;
  --body:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --teal:#26C7D1; --blue:#3D74FF; --amber:#FFB320; --coral:#FF5A38; --green:#3FD08A;
  --ink:#0C1322;
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{ font-family:var(--body); color:#EAF1FF; background:#070C1A; overflow:hidden; }

/* ===== full-screen stage + animated space background ===== */
#stage{ position:fixed; inset:0; overflow:hidden;
  background:radial-gradient(120% 90% at 78% -10%, rgba(38,199,209,.22), transparent 55%),
             radial-gradient(120% 90% at 12% 110%, rgba(61,116,255,.28), transparent 55%),
             linear-gradient(165deg,#0F1B3A 0%,#0A1024 55%,#070C1A 100%); }
.stars{ position:absolute; inset:-20% -20%; pointer-events:none;
  background-repeat:repeat; background-size:340px 340px; }
.stars.s1{ background-image:radial-gradient(1.6px 1.6px at 30px 40px,#fff,transparent),radial-gradient(1.4px 1.4px at 160px 120px,#cfe3ff,transparent),radial-gradient(1.8px 1.8px at 240px 280px,#fff,transparent),radial-gradient(1.2px 1.2px at 90px 250px,#bfe9ff,transparent); opacity:.9; animation:drift 60s linear infinite; }
.stars.s2{ background-size:520px 520px; background-image:radial-gradient(1.2px 1.2px at 80px 90px,#9fc6ff,transparent),radial-gradient(1.5px 1.5px at 400px 300px,#fff,transparent),radial-gradient(1px 1px at 220px 460px,#cbe6ff,transparent); opacity:.55; animation:drift 100s linear infinite reverse; }
.stars.tw{ animation:drift 60s linear infinite, tw 4s ease-in-out infinite; }
@keyframes drift{ to{ transform:translateY(340px); } }
@keyframes tw{ 0%,100%{ opacity:.85 } 50%{ opacity:.45 } }
.planet{ position:absolute; right:-90px; top:8%; width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #5be0ea, #1c7f97 60%, #0c4a5a); opacity:.5;
  box-shadow:0 0 80px rgba(38,199,209,.35); animation:bob 9s ease-in-out infinite; }
@keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-16px) } }

/* ===== shared screen layout ===== */
.screen{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:max(16px,env(safe-area-inset-top)) 18px 18px; text-align:center; opacity:0; transform:translateY(12px);
  transition:opacity .5s ease, transform .5s ease; pointer-events:none; }
.screen.on{ opacity:1; transform:none; pointer-events:auto; }

/* ===== title ===== */
.kicker{ font-family:var(--mono); font-size:13px; letter-spacing:.24em; text-transform:uppercase; color:var(--teal); margin:0 0 14px; }
.t-big{ font-family:var(--display); font-weight:700; line-height:1; margin:0; font-size:clamp(2.6rem,9vw,5.2rem); letter-spacing:-.02em;
  text-shadow:0 6px 40px rgba(38,199,209,.4); }
.t-big .grad{ background:linear-gradient(110deg,#7FE3FF,#3D74FF 55%,#9B7BFF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.lede{ max-width:30ch; font-size:1.12rem; opacity:.92; margin:18px 0 6px; line-height:1.5; }
.btn{ font-family:var(--display); font-weight:700; font-size:1.15rem; color:#06122b; border:none; cursor:pointer;
  padding:16px 34px; border-radius:999px; background:linear-gradient(120deg,#7FE3FF,#3D74FF); box-shadow:0 14px 34px rgba(61,116,255,.5);
  transition:transform .12s ease, box-shadow .2s ease; }
.btn:hover{ transform:translateY(-2px); box-shadow:0 18px 40px rgba(61,116,255,.6); }
.btn:active{ transform:translateY(0); }
.btn.amber{ background:linear-gradient(120deg,#FFD479,#FF9F1C); box-shadow:0 14px 34px rgba(255,159,28,.5); }
.btn.ghost{ background:transparent; color:#EAF1FF; border:2px solid rgba(255,255,255,.5); box-shadow:none; }
.btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.mini{ margin-top:18px; font-size:.92rem; opacity:.7; }
.charpod{ width:118px; height:118px; border-radius:26px; overflow:hidden; margin:6px auto 0; box-shadow:0 16px 40px rgba(0,0,0,.45);
  animation:bob 4s ease-in-out infinite; }
.charpod svg{ width:100%; height:100%; display:block; }

/* ===== board / escape lane ===== */
#board{ justify-content:flex-start; }
.hud{ width:100%; max-width:760px; display:flex; align-items:center; justify-content:space-between; gap:12px; margin:6px 0 4px; }
.hud .qn{ font-family:var(--mono); font-size:13px; letter-spacing:.12em; color:var(--teal); }
.hud .meter{ flex:1; height:12px; border-radius:99px; background:rgba(255,255,255,.12); overflow:hidden; max-width:380px; }
.hud .meter i{ display:block; height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,#3FD08A,#7FE3FF); transition:width .6s var(--ease,cubic-bezier(.22,1,.36,1)); }
.hud .steps{ font-family:var(--display); font-weight:700; font-size:.95rem; white-space:nowrap; }

.lane-wrap{ position:relative; width:100%; max-width:820px; height:172px; margin:4px 0 2px; }
.lane{ position:absolute; left:4%; right:4%; top:96px; height:8px; border-radius:99px;
  background:repeating-linear-gradient(90deg, rgba(255,255,255,.28) 0 10px, transparent 10px 22px); }
.tile{ position:absolute; top:78px; width:38px; height:38px; margin-left:-19px; border-radius:12px; transform:rotate(45deg);
  background:linear-gradient(160deg,#21407a,#162a52); border:2px solid rgba(127,227,255,.35);
  box-shadow:0 6px 16px rgba(0,0,0,.4); }
.tile.done{ background:linear-gradient(160deg,#2f7d5f,#1f5a45); border-color:rgba(63,208,138,.6); }
.tile .dot{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; transform:rotate(-45deg);
  font-family:var(--mono); font-size:12px; color:rgba(255,255,255,.5); }
.rocketbay{ position:absolute; top:30px; width:96px; height:120px; margin-left:-48px; display:flex; align-items:flex-end; justify-content:center; }
.rocketbay .pad{ position:absolute; bottom:0; width:78px; height:14px; border-radius:8px; background:linear-gradient(#9fb6e6,#5b73a8); box-shadow:0 6px 16px rgba(0,0,0,.4); }
.rocket{ position:relative; width:54px; height:96px; filter:drop-shadow(0 8px 18px rgba(0,0,0,.45)); }
.rocket .body{ position:absolute; left:50%; bottom:14px; width:36px; height:62px; margin-left:-18px; border-radius:18px 18px 10px 10px;
  background:linear-gradient(120deg,#EAF1FF,#9fb6e6); }
.rocket .nose{ position:absolute; left:50%; bottom:64px; width:0; height:0; margin-left:-18px; border-left:18px solid transparent; border-right:18px solid transparent; border-bottom:22px solid #FF7A4D; }
.rocket .win{ position:absolute; left:50%; bottom:44px; width:18px; height:18px; margin-left:-9px; border-radius:50%; background:#173b6e; box-shadow:inset 0 0 0 3px #7FE3FF; }
.rocket .fin{ position:absolute; bottom:10px; width:14px; height:26px; background:#FF7A4D; border-radius:6px; }
.rocket .fin.l{ left:2px; transform:skewX(18deg); } .rocket .fin.r{ right:2px; transform:skewX(-18deg); }

.token{ position:absolute; top:54px; width:62px; height:62px; margin-left:-31px; border-radius:16px; overflow:hidden;
  box-shadow:0 10px 24px rgba(0,0,0,.5); border:2px solid rgba(255,255,255,.55); z-index:3;
  transition:left .55s cubic-bezier(.34,1.56,.64,1); }
.token svg{ width:100%; height:100%; display:block; }
.token.hop{ animation:hop .55s ease; }
@keyframes hop{ 0%{ transform:translateY(0) } 45%{ transform:translateY(-34px) rotate(-6deg) } 100%{ transform:translateY(0) } }
.token.back{ animation:backhop .55s ease; }
@keyframes backhop{ 0%{ transform:translateY(0) } 45%{ transform:translateY(-20px) rotate(8deg) } 100%{ transform:translateY(0) } }

/* ===== question card ===== */
.qcard{ width:100%; max-width:680px; background:rgba(12,20,40,.72); backdrop-filter:blur(8px);
  border:1px solid rgba(127,227,255,.25); border-radius:22px; padding:18px 18px 20px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.qtag{ font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); margin:0 0 8px; }
.qtext{ font-family:var(--display); font-weight:700; font-size:clamp(1.15rem,3.4vw,1.5rem); line-height:1.25; margin:0 0 14px; }
.opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width:520px){ .opts{ grid-template-columns:1fr; } }
.opt{ font-family:var(--body); font-weight:600; font-size:1rem; text-align:left; color:#EAF1FF; cursor:pointer;
  background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); border-radius:14px; padding:13px 15px; transition:background .14s, border-color .14s, transform .1s; }
.opt:hover{ background:rgba(127,227,255,.14); border-color:rgba(127,227,255,.5); }
.opt:disabled{ cursor:default; }
.opt.right{ background:rgba(63,208,138,.22); border-color:var(--green); }
.opt.wrong{ background:rgba(255,90,56,.18); border-color:var(--coral); }
.qfb{ min-height:1.4em; margin-top:12px; font-weight:700; font-size:1rem; opacity:0; transition:opacity .2s; }
.qfb.show{ opacity:1; }
.qfb.good{ color:#7FF0B8; } .qfb.bad{ color:#FFC0A8; }

/* ===== finale: design the ship ===== */
.panel{ width:100%; max-width:640px; background:rgba(12,20,40,.7); border:1px solid rgba(127,227,255,.25);
  border-radius:22px; padding:22px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:4px 0 12px; }
.chip{ font-family:var(--display); font-weight:600; font-size:.9rem; color:#cfe3ff; cursor:pointer;
  background:rgba(127,227,255,.1); border:1.5px solid rgba(127,227,255,.3); border-radius:999px; padding:8px 13px; transition:background .14s, transform .1s; }
.chip:hover{ background:rgba(127,227,255,.2); transform:translateY(-1px); }
.ta{ width:100%; min-height:84px; resize:vertical; font-family:var(--body); font-size:1.05rem; color:#fff;
  background:rgba(255,255,255,.06); border:1.5px solid rgba(127,227,255,.35); border-radius:16px; padding:14px; outline:none; }
.ta:focus{ border-color:#7FE3FF; box-shadow:0 0 0 4px rgba(127,227,255,.18); }
.ta::placeholder{ color:rgba(207,227,255,.5); }
.blueprint{ margin-top:14px; text-align:left; font-family:var(--mono); font-size:.95rem; line-height:1.6; color:#CFE9FF;
  background:linear-gradient(180deg, rgba(8,30,60,.6), rgba(8,20,44,.6)); border:1px dashed rgba(127,227,255,.45); border-radius:14px;
  padding:16px; max-height:0; overflow:hidden; opacity:0; transition:max-height .7s ease, opacity .4s; }
.blueprint.show{ max-height:420px; opacity:1; }
.blueprint .bh{ font-family:var(--display); color:#7FE3FF; letter-spacing:.1em; font-size:.8rem; margin-bottom:8px; }
.spin{ display:inline-block; width:16px; height:16px; border:3px solid rgba(127,227,255,.3); border-top-color:#7FE3FF; border-radius:50%; animation:sp .8s linear infinite; vertical-align:-3px; }
@keyframes sp{ to{ transform:rotate(360deg) } }

/* ===== launch ===== */
#launch{ }
.launchpod{ position:absolute; left:50%; bottom:-140px; width:120px; margin-left:-60px; }
.launchpod.go{ animation:liftoff 3.2s cubic-bezier(.5,0,.85,.3) forwards; }
@keyframes liftoff{ 0%{ transform:translateY(0) } 16%{ transform:translateY(8px) } 100%{ transform:translateY(-128vh) } }
.launchpod .rk{ position:relative; width:120px; height:210px; margin:0 auto; }
.launchpod .rk .body{ position:absolute; left:50%; bottom:42px; width:84px; height:130px; margin-left:-42px; border-radius:42px 42px 18px 18px; background:linear-gradient(120deg,#EAF1FF,#9fb6e6); }
.launchpod .rk .nose{ position:absolute; left:50%; bottom:158px; margin-left:-42px; width:0; height:0; border-left:42px solid transparent; border-right:42px solid transparent; border-bottom:52px solid #FF7A4D; }
.launchpod .rk .port{ position:absolute; left:50%; bottom:104px; width:54px; height:54px; margin-left:-27px; border-radius:16px; overflow:hidden; background:#173b6e; box-shadow:inset 0 0 0 4px #7FE3FF; }
.launchpod .rk .port svg{ width:100%; height:100%; display:block; }
.launchpod .rk .fin{ position:absolute; bottom:36px; width:28px; height:54px; background:#FF7A4D; border-radius:8px; }
.launchpod .rk .fin.l{ left:6px; transform:skewX(20deg); } .launchpod .rk .fin.r{ right:6px; transform:skewX(-20deg); }
.flame{ position:absolute; left:50%; bottom:4px; width:46px; height:0; margin-left:-23px; border-radius:0 0 30px 30px;
  background:linear-gradient(#FFE08A,#FF9F1C 50%,#FF5A38); filter:blur(1px); opacity:0; }
.launchpod.go .flame{ animation:flame .14s ease-in-out infinite alternate, flameon .3s .2s forwards; }
@keyframes flameon{ to{ opacity:1 } }
@keyframes flame{ from{ height:60px } to{ height:110px } }
.shake{ animation:shake .12s linear infinite; }
@keyframes shake{ 0%{ transform:translate(0,0) } 25%{ transform:translate(-3px,2px) } 50%{ transform:translate(3px,-2px) } 75%{ transform:translate(-2px,-2px) } 100%{ transform:translate(2px,2px) } }
.confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.confetti i{ position:absolute; top:-12px; width:9px; height:14px; border-radius:2px; animation:fall linear forwards; }
@keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:.9 } }

/* ===== credits ===== */
#credits{ overflow:hidden; }
.crawl{ position:absolute; left:0; right:0; bottom:-10%; display:flex; flex-direction:column; align-items:center; gap:26px; padding:0 18px;
  animation:crawl 26s linear forwards; }
@keyframes crawl{ from{ transform:translateY(0) } to{ transform:translateY(-160%) } }
.crawl .cr-title{ font-family:var(--display); font-weight:700; font-size:clamp(1.8rem,6vw,3rem); color:#7FE3FF; }
.crawl .cr-role{ font-family:var(--mono); font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); margin-bottom:6px; }
.crawl > div{ display:flex; flex-direction:column; align-items:center; gap:2px; }
.crawl .cr-name{ font-family:var(--display); font-weight:700; font-size:1.5rem; }
.crawl .cr-badge{ width:120px; height:120px; border-radius:28px; overflow:hidden; box-shadow:0 16px 40px rgba(0,0,0,.5); }
.crawl .cr-badge svg{ width:100%; height:100%; display:block; }
.credits-skip{ position:absolute; bottom:22px; left:50%; transform:translateX(-50%); z-index:5; }

@media (prefers-reduced-motion:reduce){
  .stars,.planet,.charpod,.token,.launchpod,.flame,.shake,.crawl,.confetti i{ animation:none !important; }
  .launchpod.go{ transform:translateY(-128vh); transition:transform 2s ease-in; }
  .crawl{ position:static; transform:none; padding:30px 18px; }
}
</style>
</head>
<body>
<div id="stage">
  <div class="stars s1"></div>
  <div class="stars s2 tw"></div>
  <div class="planet"></div>

  <!-- screens get injected here -->
  <section id="title" class="screen on"></section>
  <section id="board" class="screen"></section>
  <section id="finale" class="screen"></section>
  <section id="launch" class="screen"></section>
  <section id="credits" class="screen"></section>
</div>

<script src="/platform/lib/avatar.js"></script>
<script src="/platform/lib/filter.js"></script>
<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  function el(tag, cls, html){ var n=document.createElement(tag); if(cls) n.className=cls; if(html!=null) n.innerHTML=html; return n; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // ---- who is escaping: the kid's own avatar + name -----------------------
  function loadProfile(){
    try{ var p=JSON.parse(localStorage.getItem('ctf:profile')||'null'); if(p) return p; }catch(e){}
    return {};
  }
  var profile = loadProfile();
  var AV = (window.CTFAvatar) ? (profile.avatar && Object.keys(profile.avatar||{}).length ? profile.avatar : window.CTFAvatar.DEFAULT) : null;
  var avatarSVG = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '🧑‍🚀';
  var heroName = (profile.display_name || 'Commander').toString().slice(0,24);

  // ---- the 10 recap questions (one per big idea across the module) ---------
  var QUESTIONS = [
    { tag:'Mission 2', q:'What makes AI different from a toaster?', o:['It is faster','It can learn from examples','It is bigger','It uses electricity'], a:1, why:'AI learns from examples — a toaster just follows fixed steps.' },
    { tag:'Mission 3', q:'How did YOU learn what a dog is — the same way AI learns?', o:['By reading a rulebook','By seeing lots of examples','By guessing once','By being born knowing'], a:1, why:'You saw lots of dogs and spotted the pattern. AI does the same!' },
    { tag:'Mission 4', q:'The examples an AI learns from are called…', o:['Homework','Data','Snacks','Pixels'], a:1, why:'Examples = data. Teaching with them is called training.' },
    { tag:'Mission 4', q:'Teaching an AI by showing it examples is called…', o:['Training','Charging','Downloading','Printing'], a:0, why:'Showing examples so it learns the pattern is training.' },
    { tag:'Mission 5', q:'An AI learns to SEE by finding patterns in…', o:['Sounds','Pixels','Smells','Magnets'], a:1, why:'Images are made of pixels — AI finds patterns in them.' },
    { tag:'Mission 6', q:'How does a chatbot build its answers?', o:['It looks them up in a book','It guesses the next word, over and over','It asks a teacher','It copies the internet exactly'], a:1, why:'It predicts the next word again and again — next-word guessing!' },
    { tag:'Mission 7', q:'The clever focus trick that powers transformers is called…', o:['Concentration','Attention','Meditation','Detection'], a:1, why:'Attention lets AI focus on the words that matter most.' },
    { tag:'Mission 8', q:'A neural network is…', o:['A real living brain','A web of pretend neurons that learns by changing connections','A fishing net for robots','A kind of wifi'], a:1, why:'It is inspired by the brain — but it is NOT alive and has no feelings.' },
    { tag:'Mission 9', q:'AI got amazingly good…', o:['Hundreds of years ago','Only recently','It never did','In the year 1900'], a:1, why:'It took a long time — the big leaps happened just recently.' },
    { tag:'Mission 10', q:'When AI sounds super sure but is WRONG, who is in charge of checking?', o:['The AI','Nobody','You are!','The internet'], a:2, why:'Confident is not the same as correct — you stay the boss.' }
  ];
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  // ---- game state ----------------------------------------------------------
  var GOAL = 6;            // rocket sits at tile index GOAL (tiles 0..GOAL)
  var pos = 0;             // where the character stands
  var asked = 0, correct = 0;
  var MAXQ = 18;           // safety cap so nobody gets stuck forever
  var bank = shuffle(QUESTIONS), bi = 0;

  function show(id){
    ['title','board','finale','launch','credits'].forEach(function(s){ $(s).classList.toggle('on', s===id); });
  }

  // ======================= TITLE ===========================================
  function renderTitle(){
    var s = $('title');
    s.innerHTML = '';
    s.appendChild(el('p','kicker','🚀 The Big Mission · Module 1'));
    s.appendChild(el('h1','t-big','The <span class="grad">Great Escape</span>'));
    s.appendChild(el('p','lede','You are locked in the AI Lab, '+esc(heroName)+'! Answer the control panel to power your escape rocket. Get it right, hop forward. Get it wrong, slip back. Reach the rocket… then design your getaway ship and BLAST OFF.'));
    var pod = el('div','charpod'); pod.innerHTML = avatarSVG; s.appendChild(pod);
    var go = el('button','btn','▶  Start the escape');
    go.style.marginTop = '20px';
    go.addEventListener('click', startBoard);
    s.appendChild(go);
    s.appendChild(el('p','mini','10 questions from everything you learned. You can do this!'));
  }

  // ======================= BOARD ===========================================
  var laneWrap, token, meterFill, stepsLbl, qnLbl, qhost;
  function renderBoardScene(){
    var s = $('board'); s.innerHTML='';
    var hud = el('div','hud');
    qnLbl = el('div','qn','QUESTION 1');
    var meter = el('div','meter'); meterFill = el('i'); meter.appendChild(meterFill);
    stepsLbl = el('div','steps','');
    hud.appendChild(qnLbl); hud.appendChild(meter); hud.appendChild(stepsLbl);
    s.appendChild(hud);

    laneWrap = el('div','lane-wrap');
    laneWrap.appendChild(el('div','lane'));
    // tiles 0..GOAL-1 are stepping stones; GOAL is the rocket bay
    for(var i=0;i<GOAL;i++){
      var t = el('div','tile'); t.style.left = pct(i); t.setAttribute('data-i',i);
      t.appendChild(el('span','dot', (i===0?'★':'')));
      laneWrap.appendChild(t);
    }
    var bay = el('div','rocketbay'); bay.style.left = pct(GOAL);
    bay.innerHTML = '<div class="pad"></div><div class="rocket"><div class="nose"></div><div class="body"></div><div class="win"></div><div class="fin l"></div><div class="fin r"></div></div>';
    laneWrap.appendChild(bay);

    token = el('div','token'); token.innerHTML = avatarSVG; token.style.left = pct(pos);
    laneWrap.appendChild(token);
    s.appendChild(laneWrap);

    qhost = el('div'); qhost.style.width='100%'; qhost.style.display='flex'; qhost.style.justifyContent='center';
    s.appendChild(qhost);
    updateHud();
  }
  function pct(i){ return (4 + (i/GOAL)*92) + '%'; }
  function updateHud(){
    meterFill.style.width = Math.round((pos/GOAL)*100) + '%';
    var left = Math.max(0, GOAL-pos);
    stepsLbl.textContent = left===0 ? '🚀 At the rocket!' : (left+' step'+(left===1?'':'s')+' to the rocket');
    qnLbl.textContent = 'QUESTION ' + (asked+1);
    laneWrap.querySelectorAll('.tile').forEach(function(t){ t.classList.toggle('done', (+t.getAttribute('data-i'))<pos); });
  }

  function startBoard(){ show('board'); renderBoardScene(); setTimeout(askQuestion, 420); }

  function nextQ(){ if(bi>=bank.length){ bank=shuffle(QUESTIONS); bi=0; } return bank[bi++]; }

  function askQuestion(){
    var Q = nextQ();
    var card = el('div','qcard');
    card.appendChild(el('p','qtag','CONTROL PANEL · '+esc(Q.tag)));
    card.appendChild(el('h2','qtext', esc(Q.q)));
    var opts = el('div','opts');
    Q.o.forEach(function(text, i){
      var b = el('button','opt', esc(text));
      b.addEventListener('click', function(){ answer(Q, i, opts, fb); });
      opts.appendChild(b);
    });
    card.appendChild(opts);
    var fb = el('div','qfb'); card.appendChild(fb);
    qhost.innerHTML=''; qhost.appendChild(card);
    requestAnimationFrame(function(){ card.style.transition='opacity .35s, transform .35s'; });
  }

  function answer(Q, choice, opts, fb){
    var btns = opts.querySelectorAll('.opt');
    btns.forEach(function(b){ b.disabled=true; });
    var right = (choice===Q.a);
    btns[Q.a].classList.add('right');
    if(!right) btns[choice].classList.add('wrong');
    asked++;
    if(right){
      correct++;
      fb.className='qfb show good'; fb.textContent='✅ '+Q.why;
      moveToken(Math.min(GOAL, pos+1), 'hop');
    } else {
      fb.className='qfb show bad'; fb.textContent='↩️ '+Q.why;
      moveToken(Math.max(0, pos-1), 'back');
    }
    setTimeout(function(){
      if(pos>=GOAL){ startFinale(); return; }
      if(asked>=MAXQ){ // friendly boost so nobody is ever stuck
        pos=GOAL; updateHud(); token.style.left=pct(pos);
        setTimeout(startFinale, 700); return;
      }
      askQuestion();
    }, right ? 1500 : 1900);
  }

  function moveToken(newPos, kind){
    token.classList.remove('hop','back'); void token.offsetWidth;
    token.classList.add(kind);
    pos = newPos;
    // move horizontally midway through the hop arc
    setTimeout(function(){ token.style.left = pct(pos); updateHud(); }, 120);
  }

  // ======================= FINALE: design the ship =========================
  function startFinale(){
    show('finale');
    var s = $('finale'); s.innerHTML='';
    s.appendChild(el('p','kicker','🛠️  Final step · build your getaway ship'));
    s.appendChild(el('h1','t-big', 'Design your <span class="grad">escape ship</span>'));
    s.appendChild(el('p','lede','You made it to the rocket, '+esc(heroName)+'! Tell a REAL AI how to build your ship — what it looks like, what powers it, what it can do. The AI will draw up the blueprint.'));

    var panel = el('div','panel');
    var chips = el('div','chips');
    ['A rocket powered by my curiosity','A ship that turns my drawings into wings','A submarine-rocket that escapes by sea AND sky','A glowing ship made of starlight and code'].forEach(function(idea){
      var c = el('button','chip', esc(idea));
      c.addEventListener('click', function(){ ta.value=idea; ta.focus(); });
      chips.appendChild(c);
    });
    panel.appendChild(chips);
    var ta = el('textarea','ta'); ta.placeholder='My escape ship is… (describe it!)'; ta.maxLength=240;
    panel.appendChild(ta);
    var row = el('div'); row.style.cssText='display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;';
    var build = el('button','btn amber','✨  Build my ship');
    row.appendChild(build); panel.appendChild(row);
    var blue = el('div','blueprint'); panel.appendChild(blue);
    var launchBtn = el('button','btn','🚀  LAUNCH!'); launchBtn.style.cssText='margin-top:16px;display:none;';
    panel.appendChild(launchBtn);
    s.appendChild(panel);

    var busy=false;
    function build_(){
      var q = ta.value.trim();
      if(!q){ ta.focus(); return; }
      if(window.CTFFilter && window.CTFFilter.isClean && !window.CTFFilter.isClean(q)){
        blue.classList.add('show'); blue.innerHTML='<div class="bh">MISSION CONTROL</div>Let\'s keep it kind and fun — describe a cool, friendly ship and try again! 😊';
        return;
      }
      if(busy) return; busy=true; build.disabled=true; build.innerHTML='<span class="spin"></span>  Drawing blueprint…';
      blue.classList.add('show'); blue.innerHTML='<div class="bh">MISSION CONTROL</div>Reading your design…';
      var prompt = 'A kid is designing their escape spaceship to blast out of the AI Lab. They described it as: "'+q+'". In 2-3 short, thrilling sentences for a 9-year-old, describe their awesome custom spaceship like mission control reading the official blueprint. Mention a detail they said, give it one cool AI-powered feature, and end with "Cleared for launch!"';
      fetch('/api/ai', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ mode:'kids', prompt:prompt }) })
        .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
        .then(function(res){
          var text = (res.ok && res.d.text) ? res.d.text : fallbackBlueprint(q);
          showBlueprint(text);
        })
        .catch(function(){ showBlueprint(fallbackBlueprint(q)); });
    }
    function fallbackBlueprint(q){
      return 'Blueprint locked in: your "'+q+'" gleams on the launchpad, its AI core already plotting the perfect escape route through the stars. Engines lit, hatch sealed — Cleared for launch!';
    }
    function showBlueprint(text){
      blue.classList.add('show');
      blue.innerHTML = '<div class="bh">📋 OFFICIAL BLUEPRINT — '+esc(heroName.toUpperCase())+'</div>'+esc(text);
      build.innerHTML='✅ Ship built!'; build.disabled=true; busy=false;
      launchBtn.style.display='inline-block';
      launchBtn.addEventListener('click', doLaunch, { once:true });
      launchBtn.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
    build.addEventListener('click', build_);
  }

  // ======================= LAUNCH ==========================================
  function doLaunch(){
    show('launch');
    var s = $('launch'); s.innerHTML='';
    s.appendChild(el('p','kicker','t-minus 3… 2… 1…'));
    var pod = el('div','launchpod');
    pod.innerHTML =
      '<div class="rk shake"><div class="nose"></div><div class="body"></div>'+
        '<div class="port">'+avatarSVG+'</div><div class="fin l"></div><div class="fin r"></div>'+
        '<div class="flame"></div></div>';
    s.appendChild(pod);
    var conf = el('div','confetti'); s.appendChild(conf);
    // brief countdown shimmer, then liftoff
    setTimeout(function(){
      pod.classList.add('go');
      burst(conf, 70);
    }, 700);
    setTimeout(showCredits, 3600);
  }
  function burst(host, n){
    var colors=['#7FE3FF','#FFD479','#FF7A4D','#3FD08A','#9B7BFF','#fff'];
    for(var i=0;i<n;i++){
      var c=el('i'); c.style.left=Math.random()*100+'%';
      c.style.background=colors[i%colors.length];
      c.style.animationDuration=(1.6+Math.random()*1.8)+'s';
      c.style.animationDelay=(Math.random()*0.5)+'s';
      c.style.transform='rotate('+(Math.random()*360)+'deg)';
      host.appendChild(c);
    }
  }

  // ======================= CREDITS =========================================
  function showCredits(){
    show('credits');
    var s = $('credits'); s.innerHTML='';
    var badge = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '';
    var crawl = el('div','crawl');
    crawl.innerHTML =
      '<div class="cr-title">THE GREAT ESCAPE</div>'+
      '<div class="cr-badge">'+badge+'</div>'+
      '<div><div class="cr-role">Starring</div><div class="cr-name">'+esc(heroName)+'</div><div style="opacity:.8">as the Future Builder</div></div>'+
      '<div><div class="cr-role">Questions answered</div><div class="cr-name">'+correct+' correct 🎯</div></div>'+
      '<div><div class="cr-role">Spaceship designed by</div><div class="cr-name">'+esc(heroName)+' + a real AI 🤖</div></div>'+
      '<div><div class="cr-role">Directed by</div><div class="cr-name">Curiosity</div></div>'+
      '<div><div class="cr-role">Powered by</div><div class="cr-name">Everything you learned in Module 1</div></div>'+
      '<div style="margin-top:8px;font-size:1.2rem;opacity:.92">You officially understand AI — and you just used it to escape.</div>'+
      '<div class="cr-title" style="font-size:clamp(1.4rem,5vw,2.2rem)">Module 1 Complete 🏆</div>';
    s.appendChild(crawl);
    var fin = el('button','btn ghost credits-skip','Back to Missions  →');
    fin.addEventListener('click', function(){ try{ localStorage.setItem('ctf:bigmission:done','1'); }catch(e){} location.href='/platform/missions.html'; });
    s.appendChild(fin);
    try{ localStorage.setItem('ctf:bigmission:done','1'); }catch(e){}
  }

  // ---- boot ----------------------------------------------------------------
  renderTitle();
})();
</script>
</body>
</html>
