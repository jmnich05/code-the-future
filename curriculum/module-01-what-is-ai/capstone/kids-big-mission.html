<!DOCTYPE html>
<html lang="en">
<head>

<title>Code the Future — Module 1 · The Big Mission (Kids)</title>
<link rel="stylesheet" href="ctf-ai.css">
<style>
  body{ margin:0; background:#F6F8FC; font-family:'Plus Jakarta Sans',system-ui,sans-serif; color:#2A3349; }
  .wrap{ max-width:760px; margin:0 auto; padding:0 16px 80px; }
  .hero{ background:linear-gradient(160deg,#0F1B3A 0%,#070C1A 100%); color:#fff; border-radius:0 0 28px 28px; padding:40px 28px; margin-bottom:8px; }
  .hero .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:#26C7D1; margin:0 0 10px; }
  .hero h1{ font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:-.02em; font-size:2rem; line-height:1.1; margin:0 0 8px; }
  .hero h1 .accent{ color:#3D74FF; }
  .hero p{ margin:0; opacity:.85; max-width:48ch; }
</style>
</head>

  <div class="hero">
    <p class="eyebrow">◆ Module 1 · What Is AI? · Type A (Ages 8–11)</p>

  </div>
  <div class="wrap">
    <div class="ctf"><div data-ctf-ai="kids" data-endpoint="/api/ai"></div></div>

  <script src="ctf-ai.js"></script>
