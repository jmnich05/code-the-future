<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="/platform/assets/logo-icon-tile.svg">
<link rel="apple-touch-icon" href="/platform/assets/touch-icon.png">
<title>Code the Future — The Big Mission: Save Tomorrow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root{
  --display:'Space Grotesk','Trebuchet MS',system-ui,sans-serif;
  --body:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --teal:#26C7D1; --blue:#3D74FF; --amber:#FFB320; --coral:#FF5A38; --green:#3FD08A;
  --ink:#0C1322;
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{ font-family:var(--body); color:#EAF1FF; background:#070C1A; overflow:hidden; }

/* ===== full-screen stage + animated sky ===== */
#stage{ position:fixed; inset:0; overflow:hidden;
  background:radial-gradient(120% 90% at 80% -10%, rgba(63,208,138,.22), transparent 55%),
             radial-gradient(120% 90% at 10% 110%, rgba(61,116,255,.28), transparent 55%),
             linear-gradient(165deg,#0F1B3A 0%,#0A1024 55%,#070C1A 100%); }
.stars{ position:absolute; inset:-20% -20%; pointer-events:none; background-repeat:repeat; background-size:340px 340px; }
.stars.s1{ background-image:radial-gradient(1.6px 1.6px at 30px 40px,#fff,transparent),radial-gradient(1.4px 1.4px at 160px 120px,#cfe3ff,transparent),radial-gradient(1.8px 1.8px at 240px 280px,#fff,transparent),radial-gradient(1.2px 1.2px at 90px 250px,#bfe9ff,transparent); opacity:.9; animation:drift 60s linear infinite; }
.stars.s2{ background-size:520px 520px; background-image:radial-gradient(1.2px 1.2px at 80px 90px,#9fc6ff,transparent),radial-gradient(1.5px 1.5px at 400px 300px,#fff,transparent),radial-gradient(1px 1px at 220px 460px,#cbe6ff,transparent); opacity:.55; animation:drift 100s linear infinite reverse; }
.stars.tw{ animation:drift 60s linear infinite, tw 4s ease-in-out infinite; }
@keyframes drift{ to{ transform:translateY(340px); } }
@keyframes tw{ 0%,100%{ opacity:.85 } 50%{ opacity:.45 } }
.planet{ position:absolute; right:-90px; top:8%; width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #7af0b6, #1f9f76 60%, #0c5a48); opacity:.45;
  box-shadow:0 0 80px rgba(63,208,138,.35); animation:bob 9s ease-in-out infinite; }
@keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-16px) } }

/* ===== shared screen layout ===== */
.screen{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:max(16px,env(safe-area-inset-top)) 18px 18px; text-align:center; opacity:0; transform:translateY(12px);
  transition:opacity .5s ease, transform .5s ease; pointer-events:none; }
.screen.on{ opacity:1; transform:none; pointer-events:auto; }

/* ===== title ===== */
.kicker{ font-family:var(--mono); font-size:13px; letter-spacing:.24em; text-transform:uppercase; color:var(--green); margin:0 0 14px; }
.t-big{ font-family:var(--display); font-weight:700; line-height:1; margin:0; font-size:clamp(2.6rem,9vw,5.2rem); letter-spacing:-.02em;
  text-shadow:0 6px 40px rgba(63,208,138,.35); }
.t-big .grad{ background:linear-gradient(110deg,#9BF5C7,#26C7D1 50%,#3D74FF); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.lede{ max-width:32ch; font-size:1.12rem; opacity:.92; margin:18px 0 6px; line-height:1.5; }
.btn{ font-family:var(--display); font-weight:700; font-size:1.15rem; color:#06122b; border:none; cursor:pointer;
  padding:16px 34px; border-radius:999px; background:linear-gradient(120deg,#9BF5C7,#26C7D1); box-shadow:0 14px 34px rgba(38,199,209,.5);
  transition:transform .12s ease, box-shadow .2s ease; }
.btn:hover{ transform:translateY(-2px); box-shadow:0 18px 40px rgba(38,199,209,.6); }
.btn:active{ transform:translateY(0); }
.btn.amber{ background:linear-gradient(120deg,#FFD479,#FF9F1C); box-shadow:0 14px 34px rgba(255,159,28,.5); }
.btn.blue{ background:linear-gradient(120deg,#7FE3FF,#3D74FF); box-shadow:0 14px 34px rgba(61,116,255,.5); }
.btn.ghost{ background:transparent; color:#EAF1FF; border:2px solid rgba(255,255,255,.5); box-shadow:none; }
.btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.mini{ margin-top:18px; font-size:.92rem; opacity:.7; max-width:38ch; }
.charpod{ width:118px; height:118px; border-radius:26px; overflow:hidden; margin:6px auto 0; box-shadow:0 16px 40px rgba(0,0,0,.45); animation:bob 4s ease-in-out infinite; }
.charpod svg{ width:100%; height:100%; display:block; }

/* ===== board: the world map ===== */
#world{ justify-content:flex-start; align-items:stretch; padding:0; }
.world{ position:relative; flex:1 1 auto; width:100%; min-height:340px; overflow:hidden;
  background:radial-gradient(80% 60% at 50% -8%, rgba(127,227,255,.08), transparent 60%), linear-gradient(180deg,#0a1430 0%,#0a1228 60%,#070d1e 100%); }
.world .continents{ position:absolute; inset:0; opacity:.55; pointer-events:none; background:
  radial-gradient(40% 30% at 22% 38%, rgba(63,208,138,.30), transparent 62%),
  radial-gradient(34% 26% at 66% 28%, rgba(61,116,255,.26), transparent 62%),
  radial-gradient(30% 24% at 52% 72%, rgba(38,199,209,.24), transparent 62%),
  radial-gradient(24% 22% at 84% 62%, rgba(255,179,32,.20), transparent 62%); }
.world .gridlines{ position:absolute; inset:0; opacity:.13; pointer-events:none; background:
  repeating-linear-gradient(0deg, rgba(127,227,255,.5) 0 1px, transparent 1px 46px),
  repeating-linear-gradient(90deg, rgba(127,227,255,.5) 0 1px, transparent 1px 46px); }
.world .haze{ position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity 1s;
  background:radial-gradient(100% 80% at 50% 50%, rgba(63,208,138,.16), transparent 60%); }

.link{ position:absolute; height:3px; z-index:2; transform-origin:left center; border-radius:3px;
  background:linear-gradient(90deg, rgba(127,227,255,.12), rgba(127,227,255,.4)); opacity:.35; transition:opacity .5s, background .5s; }
.link.done{ background:linear-gradient(90deg,#3FD08A,#7FE3FF); opacity:.85; }
.rgn{ position:absolute; width:46px; height:46px; margin:-23px; border-radius:50%; z-index:3;
  display:flex; align-items:center; justify-content:center; font-size:21px;
  background:rgba(8,16,34,.72); border:2px solid rgba(127,227,255,.3); transition:transform .4s, box-shadow .4s, border-color .4s, background .4s; }
.rgn .ring{ position:absolute; inset:-9px; border-radius:50%; border:2px solid rgba(255,212,121,.5); opacity:0; }
.rgn.active{ border-color:#FFD479; box-shadow:0 0 24px rgba(255,212,121,.6); transform:scale(1.16); }
.rgn.active .ring{ opacity:1; animation:pulse 1.7s ease-out infinite; }
@keyframes pulse{ 0%{ transform:scale(1); opacity:.6 } 100%{ transform:scale(1.9); opacity:0 } }
.rgn.lit{ border-color:#3FD08A; box-shadow:0 0 28px rgba(63,208,138,.75); background:rgba(63,208,138,.22); }
.rgn.crisis{ border-color:#FF5A38; box-shadow:0 0 22px rgba(255,90,56,.6); animation:shake .12s linear 3; }
.rgn .rlbl{ position:absolute; top:48px; left:50%; transform:translateX(-50%); white-space:nowrap;
  font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; color:#cfe3ff; opacity:.85; text-shadow:0 1px 4px #000; }

.traveler{ position:absolute; width:58px; height:58px; margin:-29px; z-index:5; border-radius:16px; overflow:hidden;
  border:3px solid rgba(255,255,255,.65); box-shadow:0 12px 26px rgba(0,0,0,.5);
  transition:left .8s cubic-bezier(.5,0,.3,1), top .8s cubic-bezier(.5,0,.3,1); }
.traveler svg{ width:100%; height:100%; display:block; }
.traveler.cheer{ animation:cheer .7s cubic-bezier(.34,1.56,.64,1); }
@keyframes cheer{ 0%{ transform:translateY(0) } 40%{ transform:translateY(-30px) rotate(-5deg) scale(1.06) } 100%{ transform:translateY(0) } }
.traveler.shakeit{ animation:shake .5s ease; }
@keyframes shake{ 0%{ transform:translate(0,0) } 25%{ transform:translate(-5px,2px) } 50%{ transform:translate(5px,-2px) } 75%{ transform:translate(-3px,-2px) } 100%{ transform:translate(2px,2px) } }

.region-tag{ position:absolute; top:12px; left:14px; z-index:6; font-family:var(--mono); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase;
  color:#cfe3ff; background:rgba(8,14,30,.62); border:1px solid rgba(127,227,255,.25); border-radius:8px; padding:6px 10px; max-width:60%; }
.region-tag b{ color:#FFD479; }
.hope-hud{ position:absolute; top:12px; right:14px; z-index:6; display:flex; align-items:center; gap:9px;
  background:rgba(8,14,30,.62); border:1px solid rgba(127,227,255,.25); border-radius:10px; padding:7px 11px; }
.hope-hud .hlbl{ font-size:14px; }
.hope-hud .hmeter{ width:110px; height:9px; border-radius:99px; background:rgba(255,255,255,.14); overflow:hidden; }
.hope-hud .hmeter i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#FFD479,#3FD08A,#7FE3FF); transition:width .8s cubic-bezier(.22,1,.36,1); }
.hope-hud .hpct{ font-family:var(--display); font-weight:700; font-size:.82rem; min-width:34px; }
.toast{ position:absolute; top:26%; left:50%; z-index:9; opacity:0; max-width:80%; transform:translate(-50%,0);
  font-family:var(--display); font-weight:700; font-size:1.05rem; text-align:center; padding:11px 18px; border-radius:14px;
  background:rgba(8,14,30,.88); border:1px solid rgba(127,227,255,.4); box-shadow:0 16px 40px rgba(0,0,0,.5); }
.toast.show{ animation:toast 1.9s ease; }
@keyframes toast{ 0%{ opacity:0; transform:translate(-50%,8px) } 12%,80%{ opacity:1; transform:translate(-50%,-6px) } 100%{ opacity:0; transform:translate(-50%,-18px) } }

.terminal{ width:100%; display:flex; justify-content:center; padding:14px 16px max(14px,env(safe-area-inset-bottom));
  background:linear-gradient(180deg, transparent, rgba(6,10,22,.55) 35%); }

/* ===== decision card ===== */
.qcard{ width:100%; max-width:700px; background:rgba(12,20,40,.74); backdrop-filter:blur(8px);
  border:1px solid rgba(127,227,255,.25); border-radius:22px; padding:18px 18px 20px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.qtag{ font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--green); margin:0 0 8px; }
.qtext{ font-family:var(--display); font-weight:700; font-size:clamp(1.12rem,3.3vw,1.46rem); line-height:1.3; margin:0 0 14px; }
.opts{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width:560px){ .opts{ grid-template-columns:1fr; } }
.opt{ font-family:var(--body); font-weight:600; font-size:1rem; text-align:left; color:#EAF1FF; cursor:pointer;
  background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); border-radius:14px; padding:13px 15px; transition:background .14s, border-color .14s, transform .1s; }
.opt:hover:not(:disabled){ background:rgba(127,227,255,.14); border-color:rgba(127,227,255,.5); transform:translateY(-1px); }
.opt:disabled{ cursor:default; }
.opt.right{ background:rgba(63,208,138,.22); border-color:var(--green); }
.opt.wrong{ background:rgba(255,90,56,.18); border-color:var(--coral); }
.qfb{ min-height:1.4em; margin-top:12px; font-weight:700; font-size:1rem; line-height:1.4; opacity:0; transition:opacity .2s; }
.qfb.show{ opacity:1; }
.qfb.good{ color:#7FF0B8; } .qfb.bad{ color:#FFC0A8; }

/* ===== finale: build your World-Helper ===== */
.panel{ width:100%; max-width:660px; background:rgba(12,20,40,.72); border:1px solid rgba(127,227,255,.25);
  border-radius:22px; padding:22px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:4px 0 12px; }
.chip{ font-family:var(--display); font-weight:600; font-size:.9rem; color:#cfe3ff; cursor:pointer;
  background:rgba(127,227,255,.1); border:1.5px solid rgba(127,227,255,.3); border-radius:999px; padding:8px 13px; transition:background .14s, transform .1s; }
.chip:hover{ background:rgba(127,227,255,.2); transform:translateY(-1px); }
.ta{ width:100%; min-height:84px; resize:vertical; font-family:var(--body); font-size:1.05rem; color:#fff;
  background:rgba(255,255,255,.06); border:1.5px solid rgba(127,227,255,.35); border-radius:16px; padding:14px; outline:none; }
.ta:focus{ border-color:#7FE3FF; box-shadow:0 0 0 4px rgba(127,227,255,.18); }
.ta::placeholder{ color:rgba(207,227,255,.5); }
.blueprint{ margin-top:14px; text-align:left; font-family:var(--mono); font-size:.95rem; line-height:1.6; color:#CFE9FF;
  background:linear-gradient(180deg, rgba(8,44,30,.55), rgba(8,30,44,.55)); border:1px dashed rgba(127,227,255,.45); border-radius:14px;
  padding:16px; max-height:0; overflow:hidden; opacity:0; transition:max-height .7s ease, opacity .4s; }
.blueprint.show{ max-height:460px; opacity:1; }
.blueprint .bh{ font-family:var(--display); color:#9BF5C7; letter-spacing:.1em; font-size:.8rem; margin-bottom:8px; }
.spin{ display:inline-block; width:16px; height:16px; border:3px solid rgba(127,227,255,.3); border-top-color:#7FE3FF; border-radius:50%; animation:sp .8s linear infinite; vertical-align:-3px; }
@keyframes sp{ to{ transform:rotate(360deg) } }

/* ===== launch: brighten the world ===== */
.globe{ position:relative; width:200px; height:200px; border-radius:50%; margin:0 auto;
  background:radial-gradient(circle at 36% 30%, #7af0b6, #1f9f76 58%, #0c5a48);
  box-shadow:0 0 0 0 rgba(63,208,138,.5); }
.globe .cont{ position:absolute; inset:0; border-radius:50%; opacity:.85; background:
  radial-gradient(22% 16% at 36% 34%, rgba(255,255,255,.25), transparent 60%),
  radial-gradient(26% 20% at 64% 56%, rgba(255,255,255,.18), transparent 60%); }
.globe.go{ animation:globe-glow 2.6s ease forwards; }
@keyframes globe-glow{ 0%{ box-shadow:0 0 30px rgba(63,208,138,.4) } 60%{ box-shadow:0 0 90px 22px rgba(127,227,255,.7) } 100%{ box-shadow:0 0 70px 10px rgba(63,208,138,.6) } }
.sat{ position:absolute; left:50%; top:50%; width:18px; height:18px; margin:-9px; border-radius:5px; background:#FFD479; box-shadow:0 0 12px #FFD479; opacity:0; }
.globe.go .sat{ animation:orbit 3s linear infinite, fadein .4s .3s forwards; }
@keyframes fadein{ to{ opacity:1 } }
@keyframes orbit{ from{ transform:rotate(0) translateX(132px) rotate(0) } to{ transform:rotate(360deg) translateX(132px) rotate(-360deg) } }
.confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.confetti i{ position:absolute; top:-12px; width:9px; height:14px; border-radius:2px; animation:fall linear forwards; }
@keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:.9 } }

/* ===== credits ===== */
#credits{ overflow:hidden; }
.crawl{ position:absolute; left:0; right:0; bottom:-10%; display:flex; flex-direction:column; align-items:center; gap:26px; padding:0 18px;
  animation:crawl 26s linear forwards; }
@keyframes crawl{ from{ transform:translateY(0) } to{ transform:translateY(-160%) } }
.crawl .cr-title{ font-family:var(--display); font-weight:700; font-size:clamp(1.8rem,6vw,3rem); color:#9BF5C7; }
.crawl .cr-role{ font-family:var(--mono); font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); margin-bottom:6px; }
.crawl > div{ display:flex; flex-direction:column; align-items:center; gap:2px; }
.crawl .cr-name{ font-family:var(--display); font-weight:700; font-size:1.5rem; }
.crawl .cr-badge{ width:120px; height:120px; border-radius:28px; overflow:hidden; box-shadow:0 16px 40px rgba(0,0,0,.5); }
.crawl .cr-badge svg{ width:100%; height:100%; display:block; }
.credits-skip{ position:absolute; bottom:22px; left:50%; transform:translateX(-50%); z-index:5; }

/* ===== outro ===== */
#outro{ justify-content:center; }
.cards{ display:flex; gap:18px; flex-wrap:wrap; justify-content:center; max-width:880px; width:100%; }
.card2{ flex:1 1 360px; max-width:430px; text-align:left; background:rgba(12,20,40,.72); border:1px solid rgba(127,227,255,.25);
  border-radius:22px; padding:22px 24px; box-shadow:0 20px 50px rgba(0,0,0,.45); }
.card2 .sub{ font-family:var(--mono); font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--green); margin:0 0 6px; }
.card2 h3{ font-family:var(--display); font-weight:700; font-size:1.45rem; margin:0 0 12px; }
.card2 ul{ margin:0; padding-left:18px; }
.card2 li{ margin:9px 0; line-height:1.45; font-size:1rem; }
.card2 .pet{ margin-top:14px; padding:11px 13px; border-radius:13px; background:rgba(63,208,138,.12); border:1px dashed rgba(63,208,138,.45); font-weight:600; }
.outro-actions{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:24px; }

/* printable parent report */
.report{ position:fixed; inset:0; z-index:9999; background:rgba(7,12,26,.9); overflow:auto; padding:24px; }
.report[hidden]{ display:none; }
.sheet{ max-width:740px; margin:0 auto; background:#fff; color:#1B2233; border-radius:18px; padding:42px 46px;
  box-shadow:0 30px 80px rgba(0,0,0,.5); font-family:var(--body); border-top:8px solid #3FD08A; }
.sheet .brand{ font-family:var(--mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:#0E9099; }
.sheet h1{ font-family:var(--display); font-size:2rem; line-height:1.1; margin:6px 0 2px; color:#0C1322; }
.sheet .modline{ color:#5F6B82; font-weight:600; margin:0 0 16px; }
.sheet .awarded{ display:flex; align-items:center; gap:14px; padding:14px 0; border-top:2px solid #ECEFF5; border-bottom:2px solid #ECEFF5; margin:8px 0 18px; }
.sheet .awarded .nm{ font-family:var(--display); font-weight:700; font-size:1.5rem; color:#1E9C6B; }
.sheet .awarded .meta{ font-size:.92rem; color:#5F6B82; }
.sheet .seal{ width:64px; height:64px; border-radius:14px; overflow:hidden; flex:0 0 auto; box-shadow:0 6px 16px rgba(12,19,34,.18); }
.sheet .seal svg{ width:100%; height:100%; display:block; }
.sheet h2{ font-family:var(--display); font-size:1.1rem; color:#0C1322; margin:20px 0 8px; }
.sheet ul{ margin:0; padding-left:20px; } .sheet li{ margin:6px 0; line-height:1.45; font-size:.98rem; }
.sheet .two{ display:grid; grid-template-columns:1fr 1fr; gap:8px 28px; }
@media (max-width:560px){ .sheet .two{ grid-template-columns:1fr; } .sheet{ padding:30px 24px; } }
.sheet .pnote{ margin-top:18px; padding:16px 18px; background:#F1FBF6; border-radius:12px; font-size:.95rem; }
.sheet .pnote b{ color:#1E9C6B; }
.sheet .foot{ margin-top:22px; padding-top:14px; border-top:2px solid #ECEFF5; font-size:.85rem; color:#8A93A8; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.report-bar{ position:sticky; top:0; z-index:2; max-width:740px; margin:0 auto 14px; padding:6px 0; display:flex; gap:10px; justify-content:flex-end; }

@media print {
  body{ background:#fff !important; }
  #stage{ display:none !important; }
  .no-print{ display:none !important; }
  .report{ position:static; background:#fff; padding:0; overflow:visible; }
  .sheet{ box-shadow:none; border-radius:0; max-width:none; border-top:6px solid #3FD08A; padding:0 6px; }
}
@media (prefers-reduced-motion:reduce){
  .stars,.planet,.charpod,.confetti i,.traveler,.rgn.active .ring,.globe.go .sat,.crawl,.traveler.cheer,.traveler.shakeit,.rgn.crisis{ animation:none !important; }
  .crawl{ position:static; transform:none; padding:30px 18px; }
}
</style>
</head>
<body>
<div id="stage">
  <div class="stars s1"></div>
  <div class="stars s2 tw"></div>
  <div class="planet"></div>

  <section id="title" class="screen on"></section>
  <section id="world" class="screen"></section>
  <section id="finale" class="screen"></section>
  <section id="launch" class="screen"></section>
  <section id="credits" class="screen"></section>
  <section id="outro" class="screen"></section>
</div>
<div id="report" class="report" hidden></div>

<script src="/platform/lib/avatar.js"></script>
<script src="/platform/lib/filter.js"></script>
<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  function el(tag, cls, html){ var n=document.createElement(tag); if(cls) n.className=cls; if(html!=null) n.innerHTML=html; return n; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // ---- who is the hero: the kid's own avatar + name -----------------------
  function loadProfile(){ try{ var p=JSON.parse(localStorage.getItem('ctf:profile')||'null'); if(p) return p; }catch(e){} return {}; }
  var profile = loadProfile();
  var AV = (window.CTFAvatar) ? (profile.avatar && Object.keys(profile.avatar||{}).length ? profile.avatar : window.CTFAvatar.DEFAULT) : null;
  var avatarSVG = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '🧑‍🚀';
  var heroName = (profile.display_name || 'Builder').toString().slice(0,24);

  // ---- the world's regions: one wise-AI decision per Module-2 big idea -----
  // x,y are percent positions on the map. The best option wins.
  var REGIONS = [
    { name:'Riverford Hospital', emoji:'🏥', x:18, y:36, tag:'Mission 3 · Health',
      q:'The AI flags a worrying spot on a patient’s scan. What happens next?',
      o:[ {t:'The AI decides the treatment by itself', ok:false},
          {t:'A human doctor double-checks it and decides', ok:true},
          {t:'Ignore it — the AI is probably wrong', ok:false} ],
      win:'Exactly — AI spots the pattern, but a caring human doctor always makes the final call.',
      miss:'Remember: AI is the helper, never the boss. A human doctor makes the final call.' },
    { name:'Greenwind Valley', emoji:'⛈️', x:42, y:22, tag:'Mission 4 · The Planet',
      q:'The AI predicts a big storm will hit this valley in two hours. Your move?',
      o:[ {t:'Wait and see if it’s really coming', ok:false},
          {t:'Warn the towns in its path so people get safe', ok:true},
          {t:'Tell the AI to stop the storm', ok:false} ],
      win:'Yes! Earlier warnings save lives — that’s AI helping take care of the planet.',
      miss:'AI can’t stop a storm, but its early warning lets people get safe in time.' },
    { name:'Builder’s Yard', emoji:'🏗️', x:64, y:36, tag:'Mission 5 · AI at Work',
      q:'A huge, boring job: sort 50,000 parts by size. Who should take it?',
      o:[ {t:'A tireless AI does the sorting', ok:true},
          {t:'Make one person do it all by hand', ok:false},
          {t:'Skip it — too boring to bother', ok:false} ],
      win:'Right — AI loves the fast, repetitive jobs, freeing people for the thinking work.',
      miss:'Fast, repetitive, huge piles = the perfect job for AI. People handle the judgment.' },
    { name:'Maplebrook', emoji:'🔒', x:48, y:62, tag:'Mission 7 · Privacy',
      q:'Someone wants AI to read kids’ private messages “to keep them safe.” Your call?',
      o:[ {t:'Sure — if it’s to help, read everything', ok:false},
          {t:'No — protect their privacy and find a safer way', ok:true},
          {t:'Only read the popular kids’ messages', ok:false} ],
      win:'Well done — even good intentions don’t beat someone’s right to privacy.',
      miss:'Privacy matters. “To help” is not a free pass to read people’s private messages.' },
    { name:'Old Harbor', emoji:'⚖️', x:80, y:54, tag:'Mission 8 · Fairness',
      q:'A powerful new AI tutor exists, but only the richest school can afford it. What’s fair?',
      o:[ {t:'Let only the rich school have it', ok:false},
          {t:'Share it so every school can use it', ok:true},
          {t:'Give it to no one at all', ok:false} ],
      win:'Yes — sharing powerful tools widely is how we keep AI fair for everyone.',
      miss:'Fairness means access for all — not just whoever can pay the most.' },
    { name:'Sunpeak City', emoji:'🕊️', x:30, y:74, tag:'Missions 9 & 10 · Who’s in Charge',
      q:'A super-AI offers to run the entire city by itself — no humans needed. Should it?',
      o:[ {t:'Yes, let the AI run everything', ok:false},
          {t:'No — AI helps, but people stay in charge', ok:true},
          {t:'Only on weekends', ok:false} ],
      win:'Perfect — tools + good rules + humans in charge = real freedom for everyone.',
      miss:'Powerful tools need people in charge. AI advises; humans make the big calls.' }
  ];
  var WORLD_EVENTS = [
    '🌱 A town you helped plants a thank-you garden in your honor!',
    '📡 Word spreads — more places ask the young Chief of AI for help!',
    '🤝 Doctors, farmers and teachers team up thanks to your good choices!'
  ];

  function show(id){ ['title','world','finale','launch','credits','outro'].forEach(function(s){ $(s).classList.toggle('on', s===id); }); }

  // ======================= TITLE ===========================================
  function renderTitle(){
    var s = $('title'); s.innerHTML='';
    s.appendChild(el('p','kicker','🌍 The Big Mission · Module 2'));
    s.appendChild(el('h1','t-big','Save <span class="grad">Tomorrow</span>'));
    s.appendChild(el('p','lede','You’ve been named the world’s first Kid Chief of AI, '+esc(heroName)+'! Six places need help. Travel the map and make the wise choice at each one — keep humans in charge, be fair, protect privacy — to light up the whole world. Then build your own World-Helper.'));
    var pod = el('div','charpod'); pod.innerHTML = avatarSVG; s.appendChild(pod);
    var go = el('button','btn','▶  Begin the mission'); go.style.marginTop='20px';
    go.addEventListener('click', startWorld); s.appendChild(go);
    s.appendChild(el('p','mini','6 regions · one wise decision each. Get it wrong? The crisis grows — think again and try until you get it right.'));
  }

  // ======================= WORLD MAP =======================================
  var world, traveler, regionTag, hopeFill, hpct, toastEl, qhost, regionEls=[];
  var idx = 0, lit = 0, busy = false;

  function buildWorld(){
    var s = $('world'); s.innerHTML='';
    world = el('div','world');
    world.innerHTML = '<div class="continents"></div><div class="gridlines"></div><div class="haze"></div>'+
      '<div class="region-tag"></div>'+
      '<div class="hope-hud"><span class="hlbl">🌟</span><div class="hmeter"><i></i></div><span class="hpct">0%</span></div>'+
      '<div class="toast"></div>';
    s.appendChild(world);
    for(var i=0;i<REGIONS.length-1;i++){ world.appendChild(el('div','link')); }
    regionEls=[];
    REGIONS.forEach(function(r){
      var pin = el('div','rgn'); pin.style.left=r.x+'%'; pin.style.top=r.y+'%';
      pin.innerHTML = '<span class="ring"></span>'+r.emoji+'<span class="rlbl">'+esc(r.name)+'</span>';
      world.appendChild(pin); regionEls.push(pin);
    });
    traveler = el('div','traveler'); traveler.innerHTML = avatarSVG; world.appendChild(traveler);
    var term = el('div','terminal'); qhost = el('div'); qhost.style.cssText='width:100%;display:flex;justify-content:center;';
    term.appendChild(qhost); s.appendChild(term);
    regionTag = world.querySelector('.region-tag'); hopeFill = world.querySelector('.hmeter i'); hpct = world.querySelector('.hpct'); toastEl = world.querySelector('.toast');
    setTimeout(layoutLinks, 60);
    moveTo(0);
  }
  function layoutLinks(){
    if(!world) return;
    var links = world.querySelectorAll('.link'), wb = world.getBoundingClientRect();
    for(var i=0;i<REGIONS.length-1;i++){
      var a=regionEls[i].getBoundingClientRect(), b=regionEls[i+1].getBoundingClientRect();
      var x1=a.left+a.width/2-wb.left, y1=a.top+a.height/2-wb.top, x2=b.left+b.width/2-wb.left, y2=b.top+b.height/2-wb.top;
      var dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy), ang=Math.atan2(dy,dx)*180/Math.PI;
      var L=links[i]; if(!L) continue; L.style.left=x1+'px'; L.style.top=y1+'px'; L.style.width=len+'px'; L.style.transform='rotate('+ang+'deg)';
    }
  }
  function moveTo(i){
    var r = REGIONS[i];
    regionEls.forEach(function(p,j){ p.classList.toggle('active', j===i && !p.classList.contains('lit')); });
    traveler.style.left = r.x+'%'; traveler.style.top = (r.y - 6)+'%';
    regionTag.innerHTML = 'Region '+(i+1)+' / '+REGIONS.length+' · <b>'+esc(r.name)+'</b>';
  }
  function setHope(){ var p=Math.round((lit/REGIONS.length)*100); hopeFill.style.width=p+'%'; hpct.textContent=p+'%'; if(p>=60) world.querySelector('.haze').style.opacity='1'; }
  function toast(msg){ toastEl.innerHTML=msg; toastEl.classList.remove('show'); void toastEl.offsetWidth; toastEl.classList.add('show'); }

  function startWorld(){ show('world'); buildWorld(); window.addEventListener('resize', layoutLinks); setTimeout(askRegion, 900); }

  function askRegion(){
    if(idx >= REGIONS.length){ setTimeout(startFinale, 500); return; }
    moveTo(idx);
    var r = REGIONS[idx];
    var order = r.o.map(function(o,i){return i;}).sort(function(){return Math.random()-0.5;});
    var card = el('div','qcard');
    card.appendChild(el('p','qtag','📡 '+esc(r.tag)));
    card.appendChild(el('h2','qtext', r.emoji+'  '+esc(r.q)));
    var opts = el('div','opts'); var fb = el('div','qfb');
    order.forEach(function(oi){
      var o = r.o[oi];
      var b = el('button','opt', esc(o.t));
      b.addEventListener('click', function(){ choose(r, o, b, opts, fb); });
      opts.appendChild(b);
    });
    card.appendChild(opts); card.appendChild(fb);
    qhost.innerHTML=''; qhost.appendChild(card);
  }

  function choose(r, o, btn, opts, fb){
    if(busy) return;
    if(o.ok){
      busy = true;
      opts.querySelectorAll('.opt').forEach(function(b){ b.disabled=true; });
      btn.classList.add('right');
      fb.className='qfb show good'; fb.textContent='✅ '+r.win;
      var pin = regionEls[idx]; pin.classList.remove('active','crisis'); pin.classList.add('lit');
      var link = world.querySelectorAll('.link')[idx-1];
      if(idx>0 && link) link.classList.add('done');
      traveler.classList.remove('cheer'); void traveler.offsetWidth; traveler.classList.add('cheer');
      lit++; setHope(); idx++;
      var ev = (idx>0 && idx<REGIONS.length && Math.random()<0.5) ? WORLD_EVENTS[Math.floor(Math.random()*WORLD_EVENTS.length)] : null;
      setTimeout(function(){ busy=false; if(ev){ toast(ev); setTimeout(askRegion, 1500); } else askRegion(); }, 1700);
    } else {
      btn.classList.add('wrong'); btn.disabled = true;
      fb.className='qfb show bad'; fb.textContent='⚠️ '+r.miss+'  Try again.';
      var pin = regionEls[idx]; pin.classList.remove('crisis'); void pin.offsetWidth; pin.classList.add('crisis');
      traveler.classList.remove('shakeit'); void traveler.offsetWidth; traveler.classList.add('shakeit');
    }
  }

  // ======================= FINALE: build your World-Helper =================
  function startFinale(){
    show('finale');
    var s = $('finale'); s.innerHTML='';
    s.appendChild(el('p','kicker','🛠️ Final step · build your World-Helper'));
    s.appendChild(el('h1','t-big','Build your <span class="grad">World-Helper</span>'));
    s.appendChild(el('p','lede','You lit up the whole world, '+esc(heroName)+'! Now design one AI helper to keep doing good. Tell a REAL AI what good it should do — it will write your helper’s official Charter.'));

    var panel = el('div','panel');
    var chips = el('div','chips');
    ['An AI that helps doctors catch sickness early','A fair tutor that helps every kid learn','A planet-helper that warns towns about storms','A kind helper that protects people’s privacy'].forEach(function(idea){
      var c = el('button','chip', esc(idea));
      c.addEventListener('click', function(){ ta.value=idea; ta.focus(); });
      chips.appendChild(c);
    });
    panel.appendChild(chips);
    var ta = el('textarea','ta'); ta.placeholder='My World-Helper will… (what good does it do?)'; ta.maxLength=240;
    panel.appendChild(ta);
    var row = el('div'); row.style.cssText='display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;';
    var build = el('button','btn amber','✨  Write its Charter');
    row.appendChild(build); panel.appendChild(row);
    var blue = el('div','blueprint'); panel.appendChild(blue);
    var launchBtn = el('button','btn','🌍  Send it into the world'); launchBtn.style.cssText='margin-top:16px;display:none;';
    panel.appendChild(launchBtn);
    s.appendChild(panel);

    var busy2=false;
    function build_(){
      var q = ta.value.trim();
      if(!q){ ta.focus(); return; }
      if(window.CTFFilter && window.CTFFilter.isClean && !window.CTFFilter.isClean(q)){
        blue.classList.add('show'); blue.innerHTML='<div class="bh">MISSION CONTROL</div>Let’s keep it kind and helpful — describe a friendly helper that does good, and try again! 😊';
        return;
      }
      if(busy2) return; busy2=true; build.disabled=true; build.innerHTML='<span class="spin"></span>  Writing the Charter…';
      blue.classList.add('show'); blue.innerHTML='<div class="bh">MISSION CONTROL</div>Reading your design…';
      var prompt = 'A kid just became the world’s Chief of AI and is designing one AI helper to do good in the world. They described it as: "'+q+'". In 2-3 short, inspiring sentences for a 9-year-old, write the official Charter for their helper. Name one specific good it does (use a detail they gave), remind that a HUMAN stays in charge of the big decisions, and end with "Cleared to help the world!"';
      fetch('/api/ai', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ mode:'kids', prompt:prompt }) })
        .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
        .then(function(res){ showBlueprint((res.ok && res.d.text) ? res.d.text : fallback(q)); })
        .catch(function(){ showBlueprint(fallback(q)); });
    }
    function fallback(q){ return 'Charter approved: your helper — "'+q+'" — sets to work doing good across the world, always with a wise human in charge of the big calls. Kind, fair, and careful. Cleared to help the world!'; }
    function showBlueprint(text){
      blue.classList.add('show');
      blue.innerHTML = '<div class="bh">📜 OFFICIAL CHARTER — '+esc(heroName.toUpperCase())+'</div>'+esc(text);
      build.innerHTML='✅ Charter written!'; build.disabled=true; busy2=false;
      launchBtn.style.display='inline-block';
      launchBtn.addEventListener('click', doLaunch, { once:true });
      launchBtn.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
    build.addEventListener('click', build_);
  }

  // ======================= LAUNCH: brighten the world =====================
  function doLaunch(){
    show('launch');
    var s = $('launch'); s.innerHTML='';
    s.appendChild(el('p','kicker','Sending your helper out…'));
    var globe = el('div','globe'); globe.innerHTML='<div class="cont"></div><div class="sat"></div>'; s.appendChild(globe);
    var cap = el('p','lede','The whole world lights up with a little more hope. 🌍'); cap.style.opacity='0'; s.appendChild(cap);
    var conf = el('div','confetti'); s.appendChild(conf);
    setTimeout(function(){ globe.classList.add('go'); burst(conf,72); cap.style.transition='opacity .6s'; cap.style.opacity='.92'; }, 500);
    setTimeout(showCredits, 3600);
  }
  function burst(host, n){
    var colors=['#9BF5C7','#FFD479','#7FE3FF','#3FD08A','#3D74FF','#fff'];
    for(var i=0;i<n;i++){ var c=el('i'); c.style.left=Math.random()*100+'%'; c.style.background=colors[i%colors.length];
      c.style.animationDuration=(1.6+Math.random()*1.8)+'s'; c.style.animationDelay=(Math.random()*0.5)+'s';
      c.style.transform='rotate('+(Math.random()*360)+'deg)'; host.appendChild(c); }
  }

  // ======================= CREDITS =========================================
  function showCredits(){
    show('credits');
    var s = $('credits'); s.innerHTML='';
    var badge = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '';
    var crawl = el('div','crawl');
    crawl.innerHTML =
      '<div class="cr-title">SAVE TOMORROW</div>'+
      '<div class="cr-badge">'+badge+'</div>'+
      '<div><div class="cr-role">Starring</div><div class="cr-name">'+esc(heroName)+'</div><div style="opacity:.8">as the Kid Chief of AI</div></div>'+
      '<div><div class="cr-role">Regions saved</div><div class="cr-name">'+lit+' / '+REGIONS.length+' 🌟</div></div>'+
      '<div><div class="cr-role">World-Helper designed by</div><div class="cr-name">'+esc(heroName)+' + a real AI 🤖</div></div>'+
      '<div><div class="cr-role">Kept in charge by</div><div class="cr-name">A wise human (you!)</div></div>'+
      '<div><div class="cr-role">Powered by</div><div class="cr-name">Everything you learned in Module 2</div></div>'+
      '<div style="margin-top:8px;font-size:1.2rem;opacity:.92">You can see where AI helps the world — and how to keep it kind, fair, and human.</div>'+
      '<div class="cr-title" style="font-size:clamp(1.4rem,5vw,2.2rem)">Module 2 Complete 🏆</div>';
    s.appendChild(crawl);
    var fin = el('button','btn credits-skip','What’s next  →'); fin.addEventListener('click', renderOutro); s.appendChild(fin);
    crawl.addEventListener('animationend', function(){ if($('credits').classList.contains('on')) renderOutro(); });
    try{ localStorage.setItem('ctf:bigmission2:done','1'); }catch(e){}
  }

  // ======================= OUTRO ===========================================
  function renderOutro(){
    show('outro');
    var s = $('outro'); s.innerHTML='';
    s.appendChild(el('p','kicker','🎉 Module 2 complete · '+esc(heroName)));
    s.appendChild(el('h1','t-big','You’re a <span class="grad">World Builder</span>'));
    var cards = el('div','cards'); cards.style.marginTop='22px';

    var next = el('div','card2');
    next.innerHTML =
      '<p class="sub">📅 Coming up · Module 3</p>'+
      '<h3>How Coding Got Done</h3>'+
      '<ul>'+
        '<li>See how people used to write <b>every line of code by hand</b> — Python, HTML, and more.</li>'+
        '<li>Watch the huge change to <b>AI coding helpers</b> that write code with you.</li>'+
        '<li>Step into a day in the life of a modern builder who <b>directs AI</b> — the taste, the calls, the output stay human.</li>'+
      '</ul>'+
      '<div class="pet">🚀 You’re ready to go from <b>using</b> AI to <b>building</b> with it.</div>';
    cards.appendChild(next);

    var rep = el('div','card2');
    rep.innerHTML =
      '<p class="sub">📄 For your grown-up</p>'+
      '<h3>Your Module 2 Report</h3>'+
      '<ul>'+
        '<li>A printable certificate of <b>what you learned</b> about AI in the real world.</li>'+
        '<li>Conversation starters about <b>privacy, fairness, and keeping humans in charge</b>.</li>'+
      '</ul>';
    var pbtn = el('button','btn amber','🖨️  Print my report'); pbtn.style.marginTop='14px';
    pbtn.addEventListener('click', openReport); rep.appendChild(pbtn);
    cards.appendChild(rep);
    s.appendChild(cards);

    var actions = el('div','outro-actions');
    var back = el('button','btn','Back to Missions  →');
    back.addEventListener('click', function(){ try{ localStorage.setItem('ctf:bigmission2:done','1'); }catch(e){} location.href='/platform/missions.html'; });
    actions.appendChild(back); s.appendChild(actions);
    try{ localStorage.setItem('ctf:bigmission2:done','1'); }catch(e){}
  }

  function openReport(){
    var when = new Date().toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' });
    var seal = (window.CTFAvatar) ? window.CTFAvatar.render(AV) : '';
    var r = $('report');
    r.innerHTML =
      '<div class="report-bar no-print">'+
        '<button class="btn amber" id="rp-print">🖨️  Print this</button>'+
        '<button class="btn ghost" id="rp-close">Close</button>'+
      '</div>'+
      '<div class="sheet">'+
        '<div class="brand">◆ Code the Future · Certificate of Completion</div>'+
        '<h1>Module 2 — AI and Our World</h1>'+
        '<p class="modline">A 12-mission journey into where AI helps the world — and how to keep it kind, fair, and human.</p>'+
        '<div class="awarded">'+
          '<div class="seal">'+seal+'</div>'+
          '<div><div class="nm">'+esc(heroName)+'</div>'+
          '<div class="meta">Completed '+esc(when)+' · Final challenge: '+lit+' / '+REGIONS.length+' regions saved 🌟</div></div>'+
        '</div>'+
        '<h2>What I learned</h2>'+
        '<ul>'+
          '<li>AI is <b>already all over the real world</b> — hospitals, farms, weather, traffic, and science labs.</li>'+
          '<li>AI helps doctors <b>spot patterns</b> early, but a <b>human doctor makes the final call</b>.</li>'+
          '<li>The teamwork rule: <b>code runs the loop, AI helps with judgment, humans handle the exceptions</b>.</li>'+
          '<li>The <b>same tool can help or hurt</b> — the choice is ours.</li>'+
          '<li>My <b>information is mine</b> to protect, and AI tools should be <b>shared fairly</b>.</li>'+
          '<li>Powerful tools need <b>good rules</b> and <b>people in charge</b> — that’s real freedom.</li>'+
          '<li>I <b>used a real AI myself</b> to design a World-Helper that does good.</li>'+
        '</ul>'+
        '<h2>Skills I practiced</h2>'+
        '<ul class="two">'+
          '<li>Ethical thinking &amp; fairness</li>'+
          '<li>Protecting privacy</li>'+
          '<li>Weighing help vs. harm</li>'+
          '<li>Keeping humans in charge of AI</li>'+
          '<li>Decision-making under pressure</li>'+
          '<li>Using real AI tools responsibly</li>'+
        '</ul>'+
        '<div class="pnote"><b>For grown-ups:</b> Ask me to explain one of these — teaching it shows I really get it. Try: “Where is AI already helping in the world?” · “Why should a human always make the final call?” · “What makes the way we share AI tools fair?”</div>'+
        '<div class="foot"><span>Code the Future · codethefuture.net</span><span>Next up: Module 3 — How Coding Got Done</span></div>'+
      '</div>';
    r.hidden = false;
    $('rp-print').addEventListener('click', function(){ window.print(); });
    $('rp-close').addEventListener('click', function(){ r.hidden = true; r.innerHTML=''; });
  }

  renderTitle();
})();
</script>
</body>
</html>
