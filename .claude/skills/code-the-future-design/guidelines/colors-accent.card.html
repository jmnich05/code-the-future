<!-- @dsCard group="Colors" viewport="700x180" name="Accent — Coral & Amber" subtitle="Warm energy — the camp spark. Coral for delight CTAs, amber for sun/optimism." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-card); font-family: var(--font-body); padding: var(--space-5); display: grid; gap: 12px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { height: 56px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 9px; line-height: 1.3; }
  .light span { color: rgba(255,255,255,.95); }
  .dark span { color: rgba(12,19,34,.7); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark"  style="background:var(--coral-50)"><span>50</span></div>
    <div class="sw dark"  style="background:var(--coral-100)"><span>100</span></div>
    <div class="sw dark"  style="background:var(--coral-200)"><span>200</span></div>
    <div class="sw light" style="background:var(--coral-400)"><span>400</span></div>
    <div class="sw light" style="background:var(--coral-500)"><span>500 · FF5A38</span></div>
    <div class="sw light" style="background:var(--coral-600)"><span>600</span></div>
  </div>
  <div class="row">
    <div class="sw dark"  style="background:var(--amber-50)"><span>50</span></div>
    <div class="sw dark"  style="background:var(--amber-100)"><span>100</span></div>
    <div class="sw dark"  style="background:var(--amber-200)"><span>200</span></div>
    <div class="sw dark"  style="background:var(--amber-300)"><span>300</span></div>
    <div class="sw dark" style="background:var(--amber-400)"><span>400 · FFB320</span></div>
    <div class="sw light" style="background:var(--amber-600)"><span>600</span></div>
  </div>
</body>
</html>
