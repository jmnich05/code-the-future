<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body {
    background: var(--surface-page);
    font-family: var(--font-body);
    display: flex; align-items: center; justify-content: center;
    min-height: 240px; padding: var(--space-6);
  }
  .lockup { display: flex; align-items: center; gap: 20px; }
  .lockup img { width: 78px; height: 78px; display: block; }
  .wordmark {
    font-family: var(--font-display);
    font-weight: var(--weight-bold);
    letter-spacing: var(--tracking-tight);
    font-size: 40px;
    line-height: 1;
    color: var(--text-strong);
    white-space: nowrap;
  }
  .wordmark .future { color: var(--color-primary); }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logo-icon.svg" alt="Code the Future icon">
    <div class="wordmark">Code the <span class="future">Future</span></div>
  </div>
</body>
</html>
