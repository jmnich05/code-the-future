<!-- @dsCard group="Colors" viewport="700x180" name="Signature gradients" subtitle="Spark, Sunrise, Night — use sparingly on hero washes and the icon glow" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-card); font-family: var(--font-body); padding: var(--space-5); display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .g { height: 110px; border-radius: var(--radius-lg); display: flex; align-items: flex-end; padding: 14px; box-shadow: var(--shadow-md); }
  .g span { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,.95); letter-spacing: .04em; }
  .spark { background: var(--gradient-spark); }
  .sunrise { background: var(--gradient-sunrise); }
  .night { background: var(--gradient-night); }
</style>
</head>
<body>
  <div class="g spark"><span>Spark · blue→teal</span></div>
  <div class="g sunrise"><span>Sunrise · coral→amber</span></div>
  <div class="g night"><span>Night · space navy</span></div>
</body>
</html>
