<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="8px base grid — generous and breathable" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-card); font-family: var(--font-mono); padding: var(--space-6); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--gradient-spark); border-radius: var(--radius-xs); width: 100%; }
  .lbl { font-size: 10px; color: var(--text-muted); }
  .val { font-size: 9px; color: var(--text-faint); }
  .item { width: 52px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="lbl">1</span><span class="val">4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="lbl">2</span><span class="val">8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="lbl">3</span><span class="val">12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="lbl">4</span><span class="val">16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="lbl">5</span><span class="val">24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="lbl">6</span><span class="val">32</span></div>
    <div class="item"><div class="bar" style="height:40px"></div><span class="lbl">7</span><span class="val">40</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="lbl">8</span><span class="val">48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="lbl">9</span><span class="val">64</span></div>
    <div class="item"><div class="bar" style="height:80px"></div><span class="lbl">10</span><span class="val">80</span></div>
  </div>
</body>
</html>
