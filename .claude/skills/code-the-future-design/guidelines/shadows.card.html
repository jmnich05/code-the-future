<!-- @dsCard group="Spacing" viewport="700x220" name="Elevation & glow" subtitle="Soft cool shadows + brand glows for hero/dark energy" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-page); font-family: var(--font-mono); padding: var(--space-7); display: flex; gap: 26px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .box { width: 84px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lbl { font-size: 10px; color: var(--text-muted); }
  .glow { background: var(--space-800); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lbl">xl</span></div>
  <div class="item"><div class="box glow" style="box-shadow:var(--glow-blue)"></div><span class="lbl">glow-blue</span></div>
  <div class="item"><div class="box glow" style="box-shadow:var(--glow-coral)"></div><span class="lbl">glow-coral</span></div>
</body>
</html>
