<!-- @dsCard group="Colors" viewport="700x200" name="Ink & Space neutrals" subtitle="Deep space-navy family — text, borders, dark surfaces" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-card); font-family: var(--font-body); padding: var(--space-5); display: grid; gap: 12px; }
  .row { display: grid; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .ink { grid-template-columns: repeat(10, 1fr); }
  .space { grid-template-columns: repeat(4, 1fr); }
  .sw { height: 52px; display: flex; align-items: flex-end; padding: 7px; }
  .sw span { font-family: var(--font-mono); font-size: 9px; }
  .light span { color: rgba(255,255,255,.9); }
  .dark span { color: rgba(12,19,34,.65); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: .08em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="lbl">Ink — text &amp; borders</div>
  <div class="row ink">
    <div class="sw light" style="background:var(--ink-900)"><span>900</span></div>
    <div class="sw light" style="background:var(--ink-800)"><span>800</span></div>
    <div class="sw light" style="background:var(--ink-700)"><span>700</span></div>
    <div class="sw light" style="background:var(--ink-600)"><span>600</span></div>
    <div class="sw light" style="background:var(--ink-500)"><span>500</span></div>
    <div class="sw dark" style="background:var(--ink-400)"><span>400</span></div>
    <div class="sw dark" style="background:var(--ink-300)"><span>300</span></div>
    <div class="sw dark" style="background:var(--ink-200)"><span>200</span></div>
    <div class="sw dark" style="background:var(--ink-100)"><span>100</span></div>
    <div class="sw dark" style="background:var(--ink-50)"><span>50</span></div>
  </div>
  <div class="lbl">Space — dark surfaces</div>
  <div class="row space">
    <div class="sw light" style="background:var(--space-900)"><span>900 · 070C1A</span></div>
    <div class="sw light" style="background:var(--space-800)"><span>800 · 0A1226</span></div>
    <div class="sw light" style="background:var(--space-700)"><span>700</span></div>
    <div class="sw light" style="background:var(--space-600)"><span>600</span></div>
  </div>
</body>
</html>
