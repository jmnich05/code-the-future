<!-- @dsCard group="Type" viewport="700x230" name="Display — Space Grotesk" subtitle="Wordmark & headlines. Geometric, friendly, a little futuristic." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-card); font-family: var(--font-display); padding: var(--space-6); color: var(--text-strong); }
  .big { font-size: 56px; font-weight: 700; letter-spacing: var(--tracking-tight); line-height: 1; }
  .accent { color: var(--color-primary); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 18px; letter-spacing: .04em; }
  .glyphs { font-size: 22px; font-weight: 500; color: var(--text-body); margin-top: 6px; }
</style>
</head>
<body>
  <div class="big">Learn to build<br>what's <span class="accent">next.</span></div>
  <div class="glyphs">AaBbCc 0123456789 &amp; ?!</div>
  <div class="meta">Space Grotesk · 400 / 500 / 600 / 700 · tracking −0.02em · fallback Futura, Trebuchet MS</div>
</body>
</html>
