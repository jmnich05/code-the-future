<!-- @dsCard group="Colors" viewport="700x180" name="Secondary — Teal & Cyan" subtitle="The futuristic edge — secondary surfaces, success, the node accent" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-card); font-family: var(--font-body); padding: var(--space-5); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { aspect-ratio: 1 / 1.15; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 9px; line-height: 1.3; }
  .light span { color: rgba(255,255,255,.92); }
  .dark span { color: rgba(12,19,34,.7); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark"  style="background:var(--teal-50)"><span>50</span></div>
    <div class="sw dark"  style="background:var(--teal-100)"><span>100</span></div>
    <div class="sw dark"  style="background:var(--teal-200)"><span>200</span></div>
    <div class="sw dark"  style="background:var(--teal-300)"><span>300</span></div>
    <div class="sw dark"  style="background:var(--teal-400)"><span>400<br>26C7D1</span></div>
    <div class="sw light" style="background:var(--teal-500)"><span>500<br>12B2BC</span></div>
    <div class="sw light" style="background:var(--teal-600)"><span>600</span></div>
    <div class="sw light" style="background:var(--teal-800)"><span>800</span></div>
  </div>
</body>
</html>
