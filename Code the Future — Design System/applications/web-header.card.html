<!-- @dsCard group="Applications" viewport="700x150" name="Website header" subtitle="Marketing nav — logo, links, primary CTA" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-body); background: var(--surface-page); display: flex; align-items: center; justify-content: center; min-height: 150px; padding: var(--space-5); }
  .bar { width: 100%; max-width: 660px; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-pill); box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 18px; padding: 10px 12px 10px 20px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo img { width: 30px; height: 30px; }
  .logo .w { font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: -0.02em; color: var(--text-strong); white-space: nowrap; }
  .logo .w span { color: var(--color-primary); }
  nav { display: flex; gap: 22px; margin-left: 8px; }
  nav a { font-size: 14px; font-weight: 500; color: var(--text-body); text-decoration: none; }
  nav a:hover { color: var(--color-primary); }
  .spacer { flex: 1; }
  .cta { display: inline-flex; align-items: center; height: 42px; padding: 0 22px; background: var(--color-primary); color: #fff; font-family: var(--font-display); font-weight: 600; font-size: 14px; border-radius: var(--radius-pill); text-decoration: none; box-shadow: var(--shadow-sm); white-space: nowrap; }
</style>
</head>
<body>
  <div class="bar">
    <div class="logo">
      <img src="../assets/logo-icon.svg" alt="">
      <div class="w">Code the <span>Future</span></div>
    </div>
    <nav>
      <a href="#">Platform</a>
      <a href="#">Camp</a>
      <a href="#">Curriculum</a>
    </nav>
    <div class="spacer"></div>
    <a class="cta" href="#">Join 2026</a>
  </div>
</body>
</html>
