<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-body); display: flex; align-items: center; justify-content: center; gap: var(--space-7); min-height: 340px; background: var(--surface-page); padding: var(--space-7); }

  /* round sticker */
  .sticker { width: 150px; height: 150px; border-radius: 50%; background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; box-shadow: var(--shadow-lg); border: 5px solid var(--blue-600); }
  .sticker img { width: 56px; height: 56px; }
  .sticker .w { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text-strong); letter-spacing: -0.01em; }

  /* spark badge sticker */
  .badge { width: 150px; height: 150px; border-radius: var(--radius-2xl); background: var(--gradient-spark); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; box-shadow: var(--glow-blue); }
  .badge .big { font-family: var(--font-display); font-weight: 800; font-size: 30px; color: #fff; line-height: .95; text-align: center; letter-spacing: -0.02em; }
  .badge .sub { font-family: var(--font-mono); font-size: 9px; color: rgba(255,255,255,.85); letter-spacing: .14em; text-transform: uppercase; }

  /* tee */
  .tee { width: 220px; height: 230px; background: var(--space-800); border-radius: 16px 16px 28px 28px; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-xl); }
  .tee::before, .tee::after { content: ''; position: absolute; top: 0; width: 46px; height: 60px; background: var(--space-800); }
  .tee::before { left: -34px; transform: rotate(20deg); border-radius: 12px; }
  .tee::after { right: -34px; transform: rotate(-20deg); border-radius: 12px; }
  .tee .art { display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 1; }
  .tee img { width: 64px; height: 64px; }
  .tee .tag { font-family: var(--font-display); font-weight: 700; font-size: 17px; color: #fff; text-align: center; line-height: 1.1; }
  .tee .tag em { color: var(--teal-300); font-style: normal; }
</style>
</head>
<body>
  <div class="sticker">
    <img src="../assets/logo-icon.svg" alt="icon">
    <div class="w">Code the Future</div>
  </div>
  <div class="badge">
    <div class="big">Build<br>what's<br>next</div>
    <div class="sub">est. 2026</div>
  </div>
  <div class="tee">
    <div class="art">
      <img src="../assets/logo-icon-dark.svg" alt="icon">
      <div class="tag">Learn to build<br><em>what's next.</em></div>
    </div>
  </div>
</body>
</html>
