# Code the Future — production site (repo root).
# Set OPENAI_API_KEY (and optionally OPENAI_MODEL / OPENAI_IMAGE_MODEL) in:
#   Netlify → Site configuration → Environment variables.
# Keys live only on the server — never shipped to the browser.

[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# Canonical host: keep all public equity on the apex domain Google sees in
# canonical tags, Open Graph URLs, robots.txt, and sitemap.xml.
[[redirects]]
  from = "https://www.codethefuture.net/*"
  to = "https://codethefuture.net/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://codethefuture.net/*"
  to = "https://codethefuture.net/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.codethefuture.net/*"
  to = "https://codethefuture.net/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/platform/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Password gate for the learner platform (sales site at / stays public).
# Active only when GATE_PASSWORD is set in Netlify env vars. The excluded
# folders are reused by the public sales page (hero/badges/avatar engine).
[[edge_functions]]
  path = "/platform/*"
  excludedPath = ["/platform/assets/*", "/platform/lib/*"]
  function = "gate"

[[edge_functions]]
  path = "/curriculum/*"
  function = "gate"

# Internal docs live in the repo but must never be served on the live site.
# Block the whole /docs/* tree (handoff notes, competitive research, etc.).
[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/buildlab"
  to = "/.netlify/functions/buildlab"
  status = 200

[[redirects]]
  from = "/api/image"
  to = "/.netlify/functions/image"
  status = 200

[[redirects]]
  from = "/api/tts"
  to = "/.netlify/functions/tts"
  status = 200

[[redirects]]
  from = "/api/notify"
  to = "/.netlify/functions/notify"
  status = 200
